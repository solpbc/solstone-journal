{# Transcript viewer - dual-timeline interface #}

<style>
/* Transcripts app styles - all classes prefixed with .tr- to avoid conflicts */

/* Columns are sticky+viewport-height; the content column scrolls the page. */

/* Main container */
.tr-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  box-sizing: border-box;
}

.tr-card {
  min-height: calc(100vh - var(--facet-bar-height) - var(--date-nav-height) - 48px);
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  display: grid;
  --tr-day-col: 200px;
  --tr-zoom-col: 120px;
  grid-template-columns: var(--tr-day-col) var(--tr-zoom-col) 1fr;
}

body.has-app-bar .tr-card {
  min-height: calc(
    100vh - var(--facet-bar-height) - var(--date-nav-height) - var(--app-bar-height) - 48px
  );
}

/* Left timeline */
.tr-timeline {
  position: sticky;
  top: calc(var(--facet-bar-height) + var(--date-nav-height) + 16px);
  align-self: start;
  border-right: 1px solid #d1d5db;
  user-select: none;
  height: calc(100vh - var(--facet-bar-height) - var(--date-nav-height) - 32px);
  overflow: hidden;
  touch-action: pan-y;
  cursor: crosshair;
  padding: 12px 0;
  box-sizing: border-box;
}

.tr-timeline-label {
  position: absolute;
  top: 0;
  left: 64px;
  right: 0;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  pointer-events: none;
  z-index: 3;
  border-bottom: 1px solid #e5e7eb;
}

.tr-timeline-legend {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 12px;
  color: #9ca3af;
  pointer-events: none;
  z-index: 3;
}

.tr-legend-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.tr-grid {
  position: absolute;
  top: 16px;
  bottom: 12px;
  left: 0;
  right: 0;
}

.tr-grid-hour {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1px solid #e5e7eb;
}

.tr-grid-quarter {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1px dashed #f3f4f6;
}

.tr-labels {
  position: absolute;
  left: 0;
  top: 16px;
  bottom: 12px;
  width: 64px;
  background: #f9fafb;
  border-right: 1px solid #e5e7eb;
  pointer-events: none;
}

.tr-label {
  position: absolute;
  right: 0;
  padding-right: 8px;
  transform: translateY(-50%);
  font-size: 12px;
  color: #6b7280;
  font-variant-numeric: tabular-nums;
}

/* Selection box */
.tr-sel-wrap {
  position: absolute;
  left: 64px;
  right: 8px;
  pointer-events: none;
  z-index: 2;
}

.tr-sel {
  position: absolute;
  left: 0;
  right: -4px;
  height: 100%;
  background: rgba(239, 246, 255, 0.7);
  border: 1px solid #c7d2fe;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
  pointer-events: auto;
  cursor: grab;
  touch-action: none;
}

.tr-sel:active {
  cursor: grabbing;
}

.tr-sel:hover {
  background: rgba(239, 246, 255, 0.85);
  border-color: #a5b4fc;
}

.tr-sel:focus-visible {
  outline: 2px solid var(--accent, #4a9eff);
  outline-offset: 2px;
}

.tr-bumper {
  position: absolute;
  left: 28px;
  right: 28px;
  margin: auto;
  height: 14px;
  border: 1px solid #60a5fa;
  border-radius: 999px;
  background: #dbeafe;
  cursor: ns-resize;
  touch-action: none;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.tr-bumper-top {
  top: -7px;
}

.tr-bumper-bottom {
  bottom: -7px;
}

.tr-bumper:hover {
  background: #bfdbfe;
  border-color: #3b82f6;
}

.tr-bumper:active {
  background: #93c5fd;
  border-color: #2563eb;
}

/* Segments lane (audio/screen indicators) */
.tr-segments {
  --seg-col-0: 8px;
  --seg-col-1: 56px;
  position: absolute;
  left: 64px;
  right: 0;
  top: 16px;
  bottom: 12px;
  pointer-events: none;
  z-index: 1;
}

.tr-seg {
  position: absolute;
  width: 40px;
  border-radius: 12px;
  box-shadow: 0 1px 1px rgba(0,0,0,.04);
  pointer-events: auto;
  cursor: pointer;
  transition: filter 0.15s ease, box-shadow 0.15s ease;
}

.tr-seg:focus-visible {
  outline: 2px solid var(--accent, #4a9eff);
  outline-offset: 1px;
}

.tr-seg:hover {
  filter: brightness(0.92);
  box-shadow: 0 2px 4px rgba(0,0,0,.10);
}

.tr-seg:active {
  filter: brightness(0.88);
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}

.tr-seg-col-0 { left: var(--seg-col-0); }
.tr-seg-col-1 { left: var(--seg-col-1); }

.tr-seg-audio {
  background: rgba(134, 239, 172, 0.6);
  border: 1px solid #4ade80;
}

.tr-seg-screen {
  background: rgba(253, 230, 138, 0.6);
  border: 1px solid #eab308;
}

.tr-seg-pending {
  opacity: 0.9;
  border-style: dashed;
}

.tr-seg-audio.tr-seg-pending {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(74, 222, 128, 0.45) 0,
      rgba(74, 222, 128, 0.45) 3px,
      rgba(134, 239, 172, 0.16) 3px,
      rgba(134, 239, 172, 0.16) 8px
    );
  border-color: #22c55e;
}

.tr-seg-screen.tr-seg-pending {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(234, 179, 8, 0.45) 0,
      rgba(234, 179, 8, 0.45) 3px,
      rgba(253, 230, 138, 0.18) 3px,
      rgba(253, 230, 138, 0.18) 8px
    );
  border-color: #ca8a04;
}

.tr-seg-awaiting {
  opacity: 1;
  border-style: solid;
}

.tr-seg-audio.tr-seg-awaiting {
  background: rgba(245, 158, 11, 0.58);
  border-color: #b45309;
}

.tr-seg-screen.tr-seg-awaiting {
  background: rgba(251, 191, 36, 0.58);
  border-color: #b45309;
}

.tr-seg-analyzing {
  opacity: 1;
  border-style: solid;
  animation: tr-analyzing-pulse 1.5s ease-in-out infinite;
}

.tr-seg-audio.tr-seg-analyzing {
  background: rgba(45, 212, 191, 0.58);
  border-color: #0d9488;
}

.tr-seg-screen.tr-seg-analyzing {
  background: rgba(96, 165, 250, 0.58);
  border-color: #2563eb;
}

@keyframes tr-analyzing-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

.tr-now-marker {
  position: absolute;
  left: 64px;
  right: 0;
  height: 0;
  border-top: 2px solid #ef4444;
  z-index: 3;
  pointer-events: none;
}

.tr-now-label {
  position: absolute;
  left: 4px;
  top: -8px;
  font-size: 12px;
  color: #ef4444;
  font-weight: 500;
  line-height: 1;
}

/* Right content panel */
.tr-content {
  padding: 4px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-sizing: border-box;
}

.tr-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.tr-header > div {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.tr-title {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}

.tr-range-text {
  color: #6b7280;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}

.tr-tabs {
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #e5e7eb;
  flex-shrink: 0;
  display: none;
}

.tr-tabs.visible {
  display: flex;
}

.tr-tab {
  padding: 8px;
  margin: 0 -8px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  background: #fff;
  color: #374151;
  transition: all 0.15s;
}

.tr-tab:hover {
  background: #f9fafb;
}

.tr-tab.active {
  background: #3b82f6;
  border-color: #3b82f6;
  color: #fff;
}

.tr-tab:focus-visible {
  outline: 2px solid var(--accent, #4a9eff);
  outline-offset: 1px;
}

.tr-tab:active:not(.active) {
  background: #f3f4f6;
  border-color: #9ca3af;
}

.tr-tab-pane {
  display: none;
  height: 100%;
}

.tr-tab-pane:focus-visible {
  outline: 2px solid var(--accent, #4a9eff);
  outline-offset: 2px;
}

.tr-tab-pane.active {
  display: block;
}

.tr-state-stack {
  display: grid;
  gap: 12px;
  padding: 16px;
}

.tr-analyze-action[disabled] {
  cursor: progress;
  opacity: 0.65;
}

.tr-analyze-error {
  margin: 8px 0 0;
  color: #991b1b;
  font-size: 13px;
}

.tr-md-content {
  padding: 16px;
  line-height: 1.6;
  font-size: 14px;
  max-width: 70ch;
}

.tr-md-content h1, .tr-md-content h2, .tr-md-content h3 {
  margin-top: 16px;
  margin-bottom: 8px;
}

.tr-md-content p {
  margin-bottom: 12px;
}

.tr-md-content ul, .tr-md-content ol {
  margin-bottom: 12px;
  padding-left: 24px;
}

.tr-md-content code {
  background: #f3f4f6;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}

.tr-md-content pre {
  background: #f3f4f6;
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin-bottom: 12px;
}

.tr-screen-text {
  padding: 8px 12px;
  color: #374151;
  font-size: 13px;
  border-left: 3px solid #e5e7eb;
  margin: 4px 0;
}

/* Delete button */
.tr-delete-btn {
  display: none;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  background: #fff;
  color: #9ca3af;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: 8px;
}

.tr-delete-btn:hover {
  background: #fef2f2;
  border-color: #fecaca;
  color: #ef4444;
}

.tr-delete-btn:focus-visible {
  outline: 2px solid #ef4444;
  outline-offset: 2px;
}

.tr-delete-btn:active {
  background: #fee2e2;
  border-color: #f87171;
  color: #dc2626;
}

.tr-delete-btn.visible {
  display: flex;
}

.tr-delete-btn svg {
  width: 16px;
  height: 16px;
}

.tr-panel {
  flex: 1;
  padding: 16px;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.5;
  transition: opacity 0.1s ease;
}

.tr-panel.loading {
  opacity: 0.5;
}

.tr-panel pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.tr-panel code {
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* Middle zoom timeline (segment selector) */
.tr-zoom {
  position: sticky;
  top: calc(var(--facet-bar-height) + var(--date-nav-height) + 16px);
  align-self: start;
  border-right: 1px solid #e5e7eb;
  user-select: none;
  height: calc(100vh - var(--facet-bar-height) - var(--date-nav-height) - 32px);
  overflow: hidden;
  padding: 12px 0;
  box-sizing: border-box;
}

body.has-app-bar .tr-timeline,
body.has-app-bar .tr-zoom {
  height: calc(
    100vh - var(--facet-bar-height) - var(--date-nav-height) - var(--app-bar-height) - 32px
  );
}

.tr-zoom-timeline-label {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  pointer-events: none;
  z-index: 3;
  border-bottom: 1px solid #e5e7eb;
}

.tr-zoom-labels {
  position: absolute;
  left: 0;
  top: 16px;
  bottom: 12px;
  width: 48px;
  background: #f9fafb;
  border-right: 1px solid #e5e7eb;
  pointer-events: none;
}

.tr-zoom-label {
  position: absolute;
  right: 0;
  padding-right: 8px;
  transform: translateY(-50%);
  font-size: 12px;
  color: #6b7280;
  font-variant-numeric: tabular-nums;
}

.tr-zoom-grid {
  position: absolute;
  top: 16px;
  bottom: 12px;
  left: 0;
  right: 0;
}

.tr-zoom-segments {
  position: absolute;
  left: 52px;
  right: 4px;
  top: 16px;
  bottom: 12px;
}

.tr-zoom-segments > .surface-state {
  position: absolute;
  inset: 0;
  padding: 16px 12px;
  gap: 8px;
}

.tr-zoom-segments > .surface-state .surface-state-icon svg {
  width: 32px;
  height: 32px;
}

.tr-zoom-segments > .surface-state .surface-state-heading {
  font-size: 13px;
}

.tr-zoom-segments > .surface-state .surface-state-desc {
  font-size: 11px;
  max-width: 24ch;
}

/* Segment pills in zoom view */
.tr-zoom-pill {
  position: absolute;
  left: 0;
  right: 0;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}

.tr-zoom-pill:hover {
  filter: brightness(0.95);
  box-shadow: 0 2px 4px rgba(0,0,0,.12);
}

.tr-zoom-pill.tr-active {
  box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.5), 0 2px 4px rgba(0,0,0,.12);
}

.tr-zoom-pill:focus-visible {
  outline: 2px solid var(--accent, #4a9eff);
  outline-offset: 1px;
}

.tr-zoom-pill:active {
  filter: brightness(0.90);
  transform: scale(0.98);
}

.tr-zoom-pill-audio {
  background: linear-gradient(135deg, rgba(134, 239, 172, 0.8), rgba(134, 239, 172, 0.6));
  border: 1px solid #4ade80;
}

.tr-zoom-pill-screen {
  background: linear-gradient(135deg, rgba(253, 230, 138, 0.8), rgba(253, 230, 138, 0.6));
  border: 1px solid #eab308;
}

.tr-zoom-pill-both {
  background: linear-gradient(to right, rgba(134, 239, 172, 0.75), rgba(194, 234, 155, 0.7) 50%, rgba(253, 230, 138, 0.75));
  border: 1px solid #84cc16;
}

.tr-zoom-pill-pending {
  border-style: dashed;
}

.tr-zoom-pill-audio.tr-zoom-pill-pending {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(74, 222, 128, 0.38) 0,
      rgba(74, 222, 128, 0.38) 4px,
      rgba(134, 239, 172, 0.18) 4px,
      rgba(134, 239, 172, 0.18) 10px
    );
  border-color: #22c55e;
}

.tr-zoom-pill-screen.tr-zoom-pill-pending {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(234, 179, 8, 0.38) 0,
      rgba(234, 179, 8, 0.38) 4px,
      rgba(253, 230, 138, 0.2) 4px,
      rgba(253, 230, 138, 0.2) 10px
    );
  border-color: #ca8a04;
}

.tr-zoom-pill-both.tr-zoom-pill-pending {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(132, 204, 22, 0.38) 0,
      rgba(132, 204, 22, 0.38) 4px,
      rgba(194, 234, 155, 0.2) 4px,
      rgba(194, 234, 155, 0.2) 10px
    );
  border-color: #65a30d;
}

.tr-zoom-pill-awaiting {
  border-style: solid;
}

.tr-zoom-pill-audio.tr-zoom-pill-awaiting {
  background: rgba(245, 158, 11, 0.62);
  border-color: #b45309;
}

.tr-zoom-pill-screen.tr-zoom-pill-awaiting {
  background: rgba(251, 191, 36, 0.62);
  border-color: #b45309;
}

.tr-zoom-pill-both.tr-zoom-pill-awaiting {
  background: linear-gradient(to right, rgba(245, 158, 11, 0.64), rgba(251, 191, 36, 0.64));
  border-color: #b45309;
}

.tr-zoom-pill-analyzing {
  border-style: solid;
  animation: tr-analyzing-pulse 1.5s ease-in-out infinite;
}

.tr-zoom-pill-audio.tr-zoom-pill-analyzing {
  background: rgba(45, 212, 191, 0.6);
  border-color: #0d9488;
}

.tr-zoom-pill-screen.tr-zoom-pill-analyzing {
  background: rgba(96, 165, 250, 0.6);
  border-color: #2563eb;
}

.tr-zoom-pill-both.tr-zoom-pill-analyzing {
  background: linear-gradient(to right, rgba(45, 212, 191, 0.62), rgba(96, 165, 250, 0.62));
  border-color: #0891b2;
}

/* Dragging state */
.tr-dragging {
  user-select: none;
  -webkit-user-select: none;
}

/* Image modal */
.tr-screenshot-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  z-index: 1000;
}

.tr-modal-nav {
  width: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.4);
  transition: all 0.15s;
  flex-shrink: 0;
}

.tr-modal-nav:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.9);
}

.tr-modal-nav:active {
  background: rgba(255,255,255,0.2);
  color: rgba(255,255,255,1);
}

.tr-modal-nav:focus-visible {
  outline: 2px solid rgba(255,255,255,0.6);
  outline-offset: -2px;
}

.tr-modal-nav.disabled {
  cursor: default;
  color: rgba(255,255,255,0.15);
  pointer-events: none;
}

.tr-modal-nav svg {
  width: 24px;
  height: 24px;
}

.tr-modal-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.tr-modal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  flex-shrink: 0;
}

.tr-modal-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  background: rgba(255,255,255,0.15);
  color: #fff;
}

.tr-modal-badge-monitor {
  background: rgba(124, 58, 237, 0.3);
  color: #c4b5fd;
}

.tr-modal-badge-category {
  background: rgba(59, 130, 246, 0.3);
  color: #93c5fd;
}

.tr-modal-close {
  margin-left: auto;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tr-modal-close:hover {
  background: rgba(255,255,255,0.3);
}

.tr-modal-close:active {
  background: rgba(255,255,255,0.4);
}

.tr-modal-close:focus-visible {
  outline: 2px solid rgba(255,255,255,0.6);
  outline-offset: 2px;
}

.tr-modal-img-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 0 20px;
}

.tr-modal-img-wrap img,
.tr-modal-img-wrap canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
  background: #1f2937;
}

.tr-modal-img-wrap canvas.loading {
  animation: tr-pulse 1.5s ease-in-out infinite;
}

.tr-modal-img-wrap canvas.tr-masked-canvas {
  cursor: pointer;
  transition: opacity 0.15s ease;
}

.tr-modal-img-wrap canvas.tr-masked-canvas:hover {
  opacity: 0.9;
}

.tr-modal-badge-masked {
  background: rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

.tr-modal-description {
  padding: 12px 20px 20px;
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
  flex-shrink: 0;
}

#trDeleteSegmentModal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(15, 23, 42, 0.55);
  z-index: 1100;
}

#trDeleteSegmentModal .modal-content {
  width: min(520px, 100%);

<script>
(() => {
  const escapeHtml = (value) => window.AppServices.escapeHtml(value);
  // Timeline bounds - computed dynamically from content
  const DEFAULT_START = 8 * 60;   // 8:00 AM default
  const DEFAULT_END = 20 * 60;    // 8:00 PM default
  const MIN_SPAN = 12 * 60;       // Minimum 12-hour span
  const BUFFER = 30;              // 30-minute buffer on each side

  let timelineStart = DEFAULT_START;
  let timelineEnd = DEFAULT_END;

  const STEP = 15;
  const DEFAULT_LEN = 60;
  const MIN_LEN = 15;

  const day = '{{ day }}';

  // Elements - main timeline
  const timeline = document.getElementById('trTimeline');
  const grid = document.getElementById('trGrid');
  const labels = document.getElementById('trLabels');
  const segmentsLane = document.getElementById('trSegments');
  const selWrap = document.getElementById('trSelWrap');
  const sel = selWrap.querySelector('.tr-sel');

  // Elements - zoom timeline
  const zoom = document.getElementById('trZoom');
  const zoomGrid = document.getElementById('trZoomGrid');
  const zoomLabels = document.getElementById('trZoomLabels');
  const zoomSegments = document.getElementById('trZoomSegments');

  // Elements - content panel
  const titleEl = document.querySelector('.tr-title');
  const rangeText = document.getElementById('trRangeText');
  const tabsContainer = document.getElementById('trTabs');
  tabsContainer.addEventListener('keydown', e => {
    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    e.preventDefault();
    const tabs = [...tabsContainer.querySelectorAll('.tr-tab')];
    const idx = tabs.indexOf(e.target);
    if (idx < 0) return;
    const next = e.key === 'ArrowRight'
      ? tabs[(idx + 1) % tabs.length]
      : tabs[(idx - 1 + tabs.length) % tabs.length];
    activateTab(next.dataset.tab);
    next.focus();
  });
	  const panel = document.getElementById('trPanel');
	  const warningNotice = document.getElementById('trWarningNotice');
	  const warningText = document.getElementById('trWarningText');
	  const warningDetails = document.getElementById('trWarningDetails');
	  const warningCaret = document.getElementById('trWarningCaret');
	  const deleteBtn = document.getElementById('trDeleteBtn');
  const deleteSegmentModal = document.getElementById('trDeleteSegmentModal');
  const deleteSegmentModalBody = document.getElementById('trDeleteSegmentModalBody');
  const deleteSegmentModalConfirm = document.getElementById('trDeleteSegmentModalConfirm');
  const emptyIcons = {
    day: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>',
    nothing: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
    transcript: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>',
    audio: '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>',
    screen: '<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>'
  };

  const BTN_LABEL_PENDING = 'analyze now';
  const BTN_LABEL_FAILED = 'try again';
  const ANALYZING_LABEL = 'analyzing…';
  const AWAITING_THINKING_LABEL = 'awaiting thinking';
  const BTN_TITLE = modality => `Process this segment's raw ${modality} observed data and generate analyzed content.`;
  const ANALYZE_POLL_INTERVAL_MS = 3000;
  const ANALYZE_POLL_MAX_MS = 30 * 60 * 1000;

  const DATA_STATE_SUFFIX = {
    pending: 'analysis pending',
    analyzing: '',
    failed: 'analysis failed'
  };

  function dataStateCopy(modality, state) {
    if (state === 'analyzing') {
      return `${modality} observed · ${ANALYZING_LABEL}`;
    }
    const suffix = DATA_STATE_SUFFIX[state];
    return suffix ? `${modality} observed · ${suffix}` : '';
  }

	  function warningTimestampLabel(ts) {
	    const parsed = new Date(ts);
	    if (Number.isNaN(parsed.getTime())) return 'time unknown';
	    return relativeTime(Date.now() - parsed.getTime()) + ' ago';
	  }

	  function renderWarningNotice(data) {
	    const count = data.warnings || 0;
	    const details = Array.isArray(data.warning_details) ? data.warning_details : [];
	    warningDetails.innerHTML = '';
	    warningNotice.setAttribute('aria-expanded', 'false');
	    warningDetails.hidden = true;
	    warningCaret.textContent = '▾';
	    if (count <= 0) {
	      warningNotice.classList.remove('visible');
	      return;
	    }
	    warningText.textContent = count + ' warning' + (count === 1 ? '' : 's') + ' during processing';
	    if (details.length === 0) {
	      const item = document.createElement('li');
	      item.textContent = 'warning details unavailable';
	      warningDetails.appendChild(item);
	    } else {
	      for (const detail of details) {
	        const item = document.createElement('li');
	        const type = detail.type || 'warning';
	        const file = detail.file || 'unknown file';
	        item.textContent = `${type} — ${file} (${warningTimestampLabel(detail.ts)})`;
	        warningDetails.appendChild(item);
	      }
	    }
	    warningNotice.classList.add('visible');
	  }

	  function toggleWarningDetails() {
	    const expanded = warningNotice.getAttribute('aria-expanded') === 'true';
	    warningNotice.setAttribute('aria-expanded', String(!expanded));
	    warningDetails.hidden = expanded;
	    warningCaret.textContent = expanded ? '▾' : '▴';
	  }

	  const warningSummary = warningNotice.querySelector('.tr-warning-summary');
	  warningSummary.addEventListener('click', toggleWarningDetails);
	  warningSummary.addEventListener('keydown', (event) => {
	    if (event.key !== 'Enter' && event.key !== ' ') return;
	    event.preventDefault();
	    toggleWarningDetails();
	  });

  // State
  let height = timeline.clientHeight;
  let ppm = height / (timelineEnd - timelineStart);
  let range = { start: 9 * 60, end: 10 * 60 };
  let drag = null;
  let allSegments = [];
  let selectedSegment = null;
  let updateNowPosition = null;
  let deleteModalReturnFocus = null;
  let deleteModalPrevOverflow = '';

  // Zoom state
  let zoomHeight = zoom.clientHeight;
  let zoomPpm = 0;

  // Modal state - all screen frames for navigation
  let allScreenFrames = [];
  let currentFrameIndex = -1;

  // ========================================
  // FrameCapture - Client-side thumbnail + on-demand full frame decoder
  // ========================================
  class FrameCapture {
    constructor() {
      // Map of video URL -> { video, ready, width, height, thumbs }
      this.videos = new Map();
      // Pending thumbnail promises per frame
      this.pendingThumbs = new Map();
      this.warnedUrls = new Set();
    }

    // Load video and wait for metadata
    loadVideo(url) {
      if (this.videos.has(url)) {
        const entry = this.videos.get(url);
        if (entry.ready) return Promise.resolve(entry);
        return entry.promise;
      }

      const video = document.createElement('video');
      video.preload = 'metadata';
      video.muted = true;
      video.playsInline = true;
      video.crossOrigin = 'anonymous';

      const promise = new Promise((resolve, reject) => {
        video.onloadedmetadata = () => {
          const entry = this.videos.get(url);
          entry.ready = true;
          entry.width = video.videoWidth;
          entry.height = video.videoHeight;
          resolve(entry);
        };
        video.onerror = () => {
          const mediaError = video.error;
          if (mediaError?.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) {
            const entry = this.videos.get(url);
            entry.unsupported = true;
            entry.errorCode = mediaError.code;
            entry.ready = true;
            if (!this.warnedUrls.has(url)) {
              this.warnedUrls.add(url);
              console.warn(`Video format not supported by this browser: ${url}`);
            }
            resolve(entry);
            return;
          }
          reject(new Error(`Failed to load video: ${url}`));
        };
        video.src = url;
      });

      this.videos.set(url, {
        video,
        ready: false,
        unsupported: false,
        errorCode: null,
        width: 0,
        height: 0,
        promise,
        thumbs: new Map(),
        queue: Promise.resolve()
      });
      return promise;
    }

    async _withVideoQueue(videoUrl, task) {
      const entry = await this.loadVideo(videoUrl);
      const run = entry.queue.then(task, task);
      entry.queue = run.catch(() => {});
      return run;
    }

    async _seekTo(video, timestamp) {
      return new Promise((resolve, reject) => {
        const onSeeked = () => {
          video.removeEventListener('seeked', onSeeked);
          video.removeEventListener('error', onError);
          resolve();
        };
        const onError = () => {
          video.removeEventListener('seeked', onSeeked);
          video.removeEventListener('error', onError);
          reject(new Error('Video seek failed'));
        };
        video.addEventListener('seeked', onSeeked);
        video.addEventListener('error', onError);
        video.currentTime = timestamp;
      });
    }

    async captureThumbnail(videoUrl, frameId, width, height) {
      const entry = await this.loadVideo(videoUrl);
      if (entry.unsupported) return null;
      const cacheKey = `${videoUrl}|${frameId}`;

      if (entry.thumbs.has(frameId)) {
        return entry.thumbs.get(frameId);
      }

      if (this.pendingThumbs.has(cacheKey)) {
        return this.pendingThumbs.get(cacheKey);
      }

      const pending = this._withVideoQueue(videoUrl, async () => {
        const video = entry.video;
        const timestamp = Math.max(0, frameId - 1);
        await this._seekTo(video, timestamp);

        let bitmap;
        if (width && height) {
          bitmap = await createImageBitmap(video, {
            resizeWidth: width,
            resizeHeight: height,
            resizeQuality: 'high'
          });
        } else {
          bitmap = await createImageBitmap(video);
        }

        const canvas = document.createElement('canvas');
        canvas.width = width || bitmap.width;
        canvas.height = height || bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        if (bitmap && typeof bitmap.close === 'function') {
          bitmap.close();
        }
        entry.thumbs.set(frameId, canvas);
        return canvas;
      });

      this.pendingThumbs.set(cacheKey, pending);
      try {
        return await pending;
      } finally {
        this.pendingThumbs.delete(cacheKey);
      }
    }

    async captureFullFrame(videoUrl, frameId) {
      const entry = await this.loadVideo(videoUrl);
      if (entry.unsupported) return null;
      return this._withVideoQueue(videoUrl, async () => {
        const video = entry.video;
        const timestamp = Math.max(0, frameId - 1);
        await this._seekTo(video, timestamp);
        return createImageBitmap(video);
      });
    }

    async prefetchThumbnails(videoUrl, frameIds, onProgress = null, signal = null) {
      if (!frameIds || frameIds.length === 0) return null;

      const sorted = [...new Set(frameIds)].sort((a, b) => a - b);
      for (let i = 0; i < sorted.length; i += 1) {
        if (signal?.aborted) return this.videos.get(videoUrl);
        const frameId = sorted[i];
        await this.captureThumbnail(videoUrl, frameId, 120, 68);
        if (onProgress) onProgress(i + 1, sorted.length);
      }

      return this.videos.get(videoUrl);
    }

    // Clear all loaded videos and cached thumbnails
    clear() {
      for (const entry of this.videos.values()) {
        entry.thumbs.clear();
        entry.video.src = '';
        entry.video.load();
      }
      this.videos.clear();
      this.pendingThumbs.clear();
      this.warnedUrls.clear();
    }

    _drawUnsupportedPlaceholder(canvas, width, height, errorCode = null) {
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f3f4f6';
      ctx.fillRect(0, 0, width, height);

      const minDim = Math.min(width, height);
      const iconWidth = minDim * 0.42;
      const iconHeight = iconWidth * 0.68;
      const radius = Math.max(4, iconWidth * 0.08);
      const strokeWidth = Math.max(2, minDim * 0.03);
      const standHeight = Math.max(6, iconHeight * 0.22);
      const textSize = Math.max(10, Math.min(height > 120 ? 24 : 14, width / (height > 120 ? 9 : 12)));
      const gap = Math.max(10, height * 0.06);
      const totalHeight = iconHeight + standHeight + gap + textSize;
      const iconX = (width - iconWidth) / 2;
      const iconY = Math.max(height * 0.14, (height - totalHeight) / 2);

      ctx.strokeStyle = '#9ca3af';
      ctx.lineWidth = strokeWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      ctx.beginPath();
      ctx.moveTo(iconX + radius, iconY);
      ctx.lineTo(iconX + iconWidth - radius, iconY);
      ctx.quadraticCurveTo(iconX + iconWidth, iconY, iconX + iconWidth, iconY + radius);
      ctx.lineTo(iconX + iconWidth, iconY + iconHeight - radius);
      ctx.quadraticCurveTo(iconX + iconWidth, iconY + iconHeight, iconX + iconWidth - radius, iconY + iconHeight);
      ctx.lineTo(iconX + radius, iconY + iconHeight);
      ctx.quadraticCurveTo(iconX, iconY + iconHeight, iconX, iconY + iconHeight - radius);
      ctx.lineTo(iconX, iconY + radius);
      ctx.quadraticCurveTo(iconX, iconY, iconX + radius, iconY);
      ctx.stroke();

      const standY = iconY + iconHeight + standHeight * 0.45;
      const standWidth = iconWidth * 0.28;
      ctx.beginPath();
      ctx.moveTo(width / 2, iconY + iconHeight);
      ctx.lineTo(width / 2, standY);
      ctx.moveTo(width / 2 - standWidth / 2, standY);
      ctx.lineTo(width / 2 + standWidth / 2, standY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(iconX + iconWidth * 0.18, iconY + iconHeight * 0.2);
      ctx.lineTo(iconX + iconWidth * 0.82, iconY + iconHeight * 0.84);
      ctx.stroke();

      ctx.fillStyle = '#6b7280';
      ctx.font = `${textSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('Format not supported', width / 2, standY + gap * 0.55);
      if (errorCode !== null) {
        ctx.fillStyle = '#6b7280';
        ctx.font = '10px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText(
          `code ${errorCode}`,
          width / 2,
          standY + gap * 0.55 + textSize + 2
        );
      }

      canvas.classList.remove('loading');
    }

    // Draw thumbnail to canvas (no overlays - those are only for full frame view)
    async drawThumbnail(canvas, videoUrl, frameId, options = {}) {
      const { width, height } = options;

      try {
        const thumb = await this.captureThumbnail(videoUrl, frameId, width, height);
        if (!thumb) {
          this._drawUnsupportedPlaceholder(
            canvas,
            width || 120,
            height || 68,
            this.videos.get(videoUrl)?.errorCode ?? null
          );
          return false;
        }

        canvas.width = width || thumb.width;
        canvas.height = height || thumb.height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(thumb, 0, 0, canvas.width, canvas.height);

        canvas.classList.remove('loading');
        return true;
      } catch (err) {
        canvas.classList.remove('loading');
        console.warn('Thumbnail draw failed:', err);
        return false;
      }
    }

    // Draw full-resolution frame to canvas (no caching)
    async drawFull(canvas, videoUrl, frameId, options = {}) {
      const { boxCoords, participants, aruco } = options;

      try {
        const bitmap = await this.captureFullFrame(videoUrl, frameId);
        if (!bitmap) {
          this._drawUnsupportedPlaceholder(
            canvas,
            640,
            360,
            this.videos.get(videoUrl)?.errorCode ?? null
          );
          return false;
        }

        canvas.width = bitmap.width;
        canvas.height = bitmap.height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);

        this._applyOverlays(ctx, canvas, bitmap.width, bitmap.height, { boxCoords, participants, aruco });

        if (bitmap && typeof bitmap.close === 'function') {
          bitmap.close();
        }
        canvas.classList.remove('loading');
        return true;
      } catch (err) {
        canvas.classList.remove('loading');
        console.warn('Full frame draw failed:', err);
        return false;
      }
    }

    // Compute mask polygon from ArUco corner tag markers
    // Corner tag IDs: 6=TL, 7=TR, 2=BR, 4=BL
    // Each marker has corners in order [TL, TR, BR, BL]
    _computeArucoMaskPolygon(aruco) {
      if (!aruco || !aruco.masked || !aruco.markers) return null;

      const cornerTagIds = { 6: 0, 7: 1, 2: 2, 4: 3 }; // id -> which corner to use
      const tagCorners = {};

      for (const marker of aruco.markers) {
        if (marker.id in cornerTagIds && marker.corners?.length === 4) {
          const cornerIdx = cornerTagIds[marker.id];
          tagCorners[marker.id] = marker.corners[cornerIdx];
        }
      }

      // Need all 4 corner tags
      if (!(6 in tagCorners && 7 in tagCorners && 2 in tagCorners && 4 in tagCorners)) {
        return null;
      }

      // Return polygon: TL, TR, BR, BL
      return [tagCorners[6], tagCorners[7], tagCorners[2], tagCorners[4]];
    }

    _applyOverlays(ctx, canvas, sourceWidth, sourceHeight, options = {}) {
      const { boxCoords, participants, aruco } = options;
      const scaleX = canvas.width / sourceWidth;
      const scaleY = canvas.height / sourceHeight;

      // Apply ArUco mask first (so other overlays draw on top)
      const maskPolygon = this._computeArucoMaskPolygon(aruco);
      if (maskPolygon) {
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.moveTo(maskPolygon[0][0] * scaleX, maskPolygon[0][1] * scaleY);
        for (let i = 1; i < maskPolygon.length; i++) {
          ctx.lineTo(maskPolygon[i][0] * scaleX, maskPolygon[i][1] * scaleY);
        }
        ctx.closePath();
        ctx.fill();
      }

      if (boxCoords && boxCoords.length === 4) {
        const [xMin, yMin, xMax, yMax] = boxCoords;
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 3;
        ctx.strokeRect(
          xMin * scaleX,
          yMin * scaleY,
          (xMax - xMin) * scaleX,
          (yMax - yMin) * scaleY
        );
      }

      if (participants && participants.length > 0) {
        for (const p of participants) {
          const x = (p.left / 100) * canvas.width;
          const y = (p.top / 100) * canvas.height;
          const w = (p.width / 100) * canvas.width;
          const h = (p.height / 100) * canvas.height;

          const colors = {
            speaking: '#fbbf24',
            active: '#4ade80',
            muted: '#f87171',
            presenting: '#60a5fa',
            unknown: '#9ca3af'
          };
          ctx.strokeStyle = colors[p.status] || colors.unknown;
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.strokeRect(x, y, w, h);
          ctx.setLineDash([]);

          const labelY = y + h + 16;
          ctx.font = '11px system-ui, sans-serif';
          const textWidth = ctx.measureText(p.name).width;
          ctx.fillStyle = colors[p.status] || colors.unknown;
          ctx.fillRect(x, y + h + 2, textWidth + 8, 16);

          ctx.fillStyle = '#000';
          ctx.fillText(p.name, x + 4, labelY - 3);
        }
      }
    }
  }

  // Global frame capture instance
  let frameCapture = new FrameCapture();

  // Utilities
  const y = (m) => (m - timelineStart) * ppm;
  const mFromY = (py) => Math.max(timelineStart, Math.min(timelineEnd, Math.round(py / ppm) + timelineStart));
  const snap = (m) => Math.round(m / STEP) * STEP;
  const hhmm = (m) => String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');

  // Zoom utilities - map minutes to pixels within the zoomed range
  const zoomY = (m) => (m - range.start) * zoomPpm;

  function parseTime(timeStr) {
    const [hh, mm] = timeStr.split(':').map(Number);
    return hh * 60 + mm;
  }

  // Format cost in cents with exact USD in title
  // Returns {text: "3c", title: "$0.0312"} or {text: "", title: ""} if null/zero
  function formatCost(costUSD) {
    if (costUSD === null || costUSD === undefined) {
      return { text: '', title: '' };
    }
    const cents = Math.round(costUSD * 100);
    const exactUSD = '$' + costUSD.toFixed(4);
    return { text: cents + 'c', title: exactUSD };
  }

  // Format bytes as human-readable size (KB, MB, GB)
  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
  }

  // Build range text with cost and total media size
  function updateRangeText() {
    if (!selectedSegment || !segmentData) return;
    const seg = selectedSegment;
    let parts = [`${seg.start} - ${seg.end}`];

    const costInfo = formatCost(segmentData.cost);
    if (costInfo.text) {
      parts.push(`<span title="${costInfo.title}">${costInfo.text}</span>`);
    }

    const sizes = segmentData.media_sizes;
    if (sizes) {
      let total = 0;
      const breakdown = [];
      if (sizes.audio) {
        total += sizes.audio;
        breakdown.push('audio ' + formatSize(sizes.audio));
      }
      if (sizes.screen) {
        total += sizes.screen;
        breakdown.push('screen ' + formatSize(sizes.screen));
      }
      if (total) {
        const title = breakdown.join(', ');
        parts.push(`<span title="${title}">${formatSize(total)}</span>`);
      }
    }

    rangeText.innerHTML = parts.join(' · ');
  }

  function computeTimelineBounds(ranges) {
    // Compute dynamic timeline bounds from content ranges
    // Returns {start, end} in minutes, snapped to hours
    const allRanges = [...(ranges.audio || []), ...(ranges.screen || [])];

    if (allRanges.length === 0) {
      return { start: DEFAULT_START, end: DEFAULT_END };
    }

    // Find min/max times across all ranges
    let minTime = Infinity;
    let maxTime = -Infinity;
    for (const rg of allRanges) {
      const s = parseTime(rg.start);
      const e = parseTime(rg.end);
      if (s < minTime) minTime = s;
      if (e > maxTime) maxTime = e;
    }

    // Add buffer and snap to hours
    let start = Math.floor((minTime - BUFFER) / 60) * 60;
    let end = Math.ceil((maxTime + BUFFER) / 60) * 60;

    // Enforce minimum span - extend end if needed
    if (end - start < MIN_SPAN) {
      end = start + MIN_SPAN;
    }

    // Clamp to valid day range (0:00 - 24:00)
    start = Math.max(0, start);
    end = Math.min(24 * 60, end);

    return { start, end };
  }

  function addSegmentIndicator(type, startMin, endMin, column, streams = [], state = 'analyzed', think = null) {
    const el = document.createElement('div');
    el.className = 'tr-seg ' + (type === 'screen' ? 'tr-seg-screen' : 'tr-seg-audio');
    if (state === 'pending') {
      el.classList.add('tr-seg-pending');
    } else if (state === 'analyzing') {
      el.classList.add('tr-seg-analyzing');
    } else if (think === 'awaiting') {
      el.classList.add('tr-seg-awaiting');
    }
    el.style.top = y(startMin) + 'px';
    el.style.height = Math.max(2, y(endMin) - y(startMin)) + 'px';
    el.classList.add(column === 1 ? 'tr-seg-col-1' : 'tr-seg-col-0');
    // Zero-padded HH:MM label
    const _h = Math.floor(startMin / 60);
    const _m = startMin % 60;
    const _label = `Segment ${String(_h).padStart(2, '0')}:${String(_m).padStart(2, '0')}`;
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', _label);
    const sortedStreams = [...streams].sort();
    const streamHead = sortedStreams.slice(0, 3).join(' + ');
    const streamToken = sortedStreams.length > 3 ? streamHead + ' +' + (sortedStreams.length - 3) : streamHead;
    const streamSuffix = sortedStreams.length ? ' · ' + streamToken : '';
    const stateSuffix = state === 'pending' ? ' · pending' : state === 'analyzing' ? ' · analyzing' : (think === 'awaiting' ? ' · ' + AWAITING_THINKING_LABEL : '');
    el.title = hhmm(startMin) + ' – ' + hhmm(endMin) + ' (' + (endMin - startMin) + ' min, ' + type + streamSuffix + stateSuffix + ')';
    el.addEventListener('click', e => {
      e.stopPropagation();
      const midMin = (startMin + endMin) / 2;
      const start = snap(midMin - DEFAULT_LEN / 2);
      range = { start, end: start + DEFAULT_LEN };
      renderTimeline();
      updateZoom();
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const midMin = (startMin + endMin) / 2;
        const start = snap(midMin - DEFAULT_LEN / 2);
        range = { start, end: start + DEFAULT_LEN };
        renderTimeline();
        updateZoom();
      }
    });
    segmentsLane.appendChild(el);
  }

  function buildGrid() {
    grid.innerHTML = '';
    labels.innerHTML = '';

    for (let h = timelineStart / 60; h <= timelineEnd / 60; h++) {
      const hourLine = document.createElement('div');
      hourLine.className = 'tr-grid-hour';
      hourLine.style.top = y(h * 60) + 'px';
      grid.appendChild(hourLine);

      const lab = document.createElement('div');
      lab.className = 'tr-label';
      lab.style.top = y(h * 60) + 'px';
      lab.textContent = String(h).padStart(2, '0') + ':00';
      labels.appendChild(lab);

      if (h < timelineEnd / 60) {
        [15, 30, 45].forEach(m => {
          const q = document.createElement('div');
          q.className = 'tr-grid-quarter';
          q.style.top = y(h * 60 + m) + 'px';
          grid.appendChild(q);
        });
      }
    }
  }

  function renderTimeline() {
    selWrap.style.top = y(range.start) + 'px';
    selWrap.style.height = (y(range.end) - y(range.start)) + 'px';
  }

  function buildZoomGrid() {
    zoomGrid.innerHTML = '';
    zoomLabels.innerHTML = '';

    const rangeLen = range.end - range.start;
    // Determine label interval based on range length
    let labelInterval = 5; // default 5 min
    if (rangeLen > 120) labelInterval = 15;
    else if (rangeLen > 60) labelInterval = 10;

    for (let m = range.start; m <= range.end; m++) {
      const yPos = zoomY(m);

      if (m % 60 === 0) {
        const line = document.createElement('div');
        line.className = 'tr-grid-hour';
        line.style.top = yPos + 'px';
        zoomGrid.appendChild(line);
      } else if (m % 15 === 0) {
        const line = document.createElement('div');
        line.className = 'tr-grid-quarter';
        line.style.top = yPos + 'px';
        zoomGrid.appendChild(line);
      }

      if (m % labelInterval === 0) {
        const lab = document.createElement('div');
        lab.className = 'tr-zoom-label';
        lab.style.top = yPos + 'px';
        lab.textContent = hhmm(m);
        zoomLabels.appendChild(lab);
      }
    }
  }

  function filterSegmentsInRange() {
    return allSegments.filter(seg => {
      const segStart = parseTime(seg.start);
      const segEnd = parseTime(seg.end);
      return segEnd > range.start && segStart < range.end;
    });
  }

  function buildZoomSegments() {
    const filtered = filterSegmentsInRange();
    const streams = [...new Set(filtered.map(s => s.stream))].sort();
    const colCount = streams.length;
    zoomSegments.innerHTML = '';

    if (filtered.length === 0) {
      zoomSegments.innerHTML = window.SurfaceState.empty({
        icon: emptyIcons.nothing,
        heading: 'no segments in this range',
        desc: 'widen the time range or pick a different day'
      });
      return;
    }

    filtered.forEach(seg => {
      const segStart = parseTime(seg.start);
      const segEnd = parseTime(seg.end);

      // Clamp to visible range
      const visStart = Math.max(segStart, range.start);
      const visEnd = Math.min(segEnd, range.end);

      const pill = document.createElement('div');
      pill.className = 'tr-zoom-pill';
      pill.setAttribute('role', 'button');
      pill.setAttribute('tabindex', '0');

      if (colCount > 1) {
        const colIdx = streams.indexOf(seg.stream);
        const colWidth = 100 / colCount;
        const gap = 0.5;
        pill.style.left = (colIdx * colWidth + gap / 2) + '%';
        pill.style.right = 'auto';
        pill.style.width = (colWidth - gap) + '%';
      }

      // Determine pill type based on content
      const hasAudio = seg.types.includes('audio');
      const hasScreen = seg.types.includes('screen');
      const dataState = seg.data_state || {};
      const hasPendingAdvertised = (seg.types || []).some(
        type => dataState[type] && dataState[type] !== 'analyzed'
      );
      const hasAnalyzingAdvertised = (seg.types || []).some(
        type => dataState[type] === 'analyzing'
      );
      if (hasAudio && hasScreen) {
        pill.classList.add('tr-zoom-pill-both');
      } else if (hasAudio) {
        pill.classList.add('tr-zoom-pill-audio');
      } else {
        pill.classList.add('tr-zoom-pill-screen');
      }
      if (hasAnalyzingAdvertised) {
        pill.classList.add('tr-zoom-pill-analyzing');
      } else if (hasPendingAdvertised) {
        pill.classList.add('tr-zoom-pill-pending');
      } else if (seg.think === 'awaiting') {
        pill.classList.add('tr-zoom-pill-awaiting');
      }
      const typeLabel = (hasAudio && hasScreen) ? 'audio and screen' : hasAudio ? 'audio' : 'screen';

      if (selectedSegment && selectedSegment.key === seg.key) {
        pill.classList.add('tr-active');
      }

      pill.style.top = zoomY(visStart) + 'px';
      pill.style.height = Math.max(4, zoomY(visEnd) - zoomY(visStart)) + 'px';
      const duration = Math.round(visEnd - visStart);
      const typeDesc = (hasAudio && hasScreen) ? 'audio + screen' : hasAudio ? 'audio' : 'screen';
      const segmentStatusLabel = hasAnalyzingAdvertised ? 'analyzing' : hasPendingAdvertised ? 'pending' : seg.think === 'awaiting' ? AWAITING_THINKING_LABEL : '';
      const statusSuffix = segmentStatusLabel ? ' · ' + segmentStatusLabel : '';
      const ariaStatusSuffix = segmentStatusLabel ? ', ' + segmentStatusLabel : '';
      pill.title = seg.start + ' – ' + seg.end + ' · ' + duration + ' min · ' + typeDesc + ' · ' + seg.stream + statusSuffix;
      pill.setAttribute('aria-label', 'Segment ' + seg.start + ' \u2013 ' + seg.end + ', ' + typeLabel + ', ' + seg.stream + ariaStatusSuffix);
      pill.dataset.key = seg.key;

      pill.addEventListener('click', () => selectSegment(seg));
      pill.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectSegment(seg);
        }
      });
      zoomSegments.appendChild(pill);
    });
  }

  function selectSegment(seg, updateHash = true, requestedTabId = null) {
    selectedSegment = seg;

    // Update URL hash for shareable links
    if (updateHash) {
      const tab = activeTab || 'transcript';
      history.replaceState(null, '', `#${seg.key}/${tab}`);
    }

    // Update active state in zoom view
    zoomSegments.querySelectorAll('.tr-zoom-pill').forEach(pill => {
      pill.classList.toggle('tr-active', pill.dataset.key === seg.key);
    });

    titleEl.textContent = seg.stream;
    rangeText.textContent = `${seg.start} - ${seg.end}`;

    // Show delete button when segment is selected
    deleteBtn.classList.add('visible');

    // Load transcript content
    loadSegmentContent(seg, requestedTabId);
  }

  // Step through segments with [ ] keys
  function navigateSegment(delta) {
    if (allSegments.length === 0) return;
    let currentIdx = selectedSegment
      ? allSegments.findIndex(s => s.key === selectedSegment.key)
      : -1;
    let nextIdx = currentIdx === -1
      ? (delta > 0 ? 0 : allSegments.length - 1)
      : currentIdx + delta;
    if (nextIdx < 0 || nextIdx >= allSegments.length) return;
    const seg = allSegments[nextIdx];
    const segStart = parseTime(seg.start);
    const segEnd = parseTime(seg.end);
    if (segStart < range.start || segEnd > range.end) {
      const rangeLen = range.end - range.start;
      const segMid = (segStart + segEnd) / 2;
      let newStart = snap(Math.max(timelineStart, segMid - rangeLen / 2));
      newStart = Math.min(newStart, timelineEnd - rangeLen);
      range = { start: newStart, end: newStart + rangeLen };
      renderTimeline();
      updateZoom();
    }
    selectSegment(seg);
  }

  // Unified timeline state
  let segmentData = null;
  let currentVideoFiles = {}; // filename -> video URL mapping
  let groupEntriesByIdx = new Map();
  let activeTab = null;
  let currentSegmentAbort = null;
  let tabPanes = {}; // tabId -> pane element
  let screenDecoded = false;
  let analyzePollTimer = null;
  let analyzePollStartedAt = 0;
  let analyzePollModalities = new Set();

  function loadSegmentContent(seg, requestedTabId = null) {
    currentSegmentAbort?.abort();
    stopAnalyzePoller();
    currentSegmentAbort = new AbortController();
    const signal = currentSegmentAbort.signal;
    const segmentToken = seg.key;

    // Clear old data, videos, tabs, and show loading message immediately
    segmentData = null;
    currentVideoFiles = {};
    tabPanes = {};
    activeTab = null;
    screenDecoded = false;
    frameCapture.clear();
    tabsContainer.classList.remove('visible');
    tabsContainer.innerHTML = '';
	    warningNotice.classList.remove('visible');
    panel.innerHTML = window.SurfaceState.loading({ text: 'Loading segment...' });
    panel.classList.add('loading');

    fetch(`/app/transcripts/api/segment/${day}/${seg.stream}/${seg.key}`, { signal })
      .then(r => r.json())
      .then(data => {
        if (!selectedSegment || selectedSegment.key !== segmentToken) {
          return;
        }
        panel.classList.remove('loading');
        renderLoadedSegmentData(data, requestedTabId);
        const analyzing = currentAnalyzingModalities(data.data_state || {});
        if (analyzing.length > 0) {
          startAnalyzePoller(analyzing);
        }
      })
      .catch(err => {
        if (err.name === 'AbortError') {
          return;
        }
        if (!selectedSegment || selectedSegment.key !== segmentToken) {
          return;
        }
        panel.classList.remove('loading');
        tabsContainer.classList.remove('visible');
        tabsContainer.innerHTML = '';
        panel.innerHTML = window.SurfaceState.error({
          heading: 'couldn\'t load this segment',
          desc: 'something went wrong loading the transcript. try selecting the segment again, or refresh the page.'
        });
      });
  }

  function prepareScreenFrames(data, targetEl, segmentToken, signal) {
    if (screenDecoded) {
      return Promise.resolve();
    }

    const isStaleSegment = () => !selectedSegment || selectedSegment.key !== segmentToken;
    if (isStaleSegment()) {
      return Promise.resolve();
    }

    currentVideoFiles = data.video_files || {};

    const nonBasicByVideo = new Map();
    (data.chunks || []).forEach(chunk => {
      if (chunk.type !== 'screen') return;
      if (chunk.basic === true) return;
      const filename = chunk.source_ref?.filename;
      const frameId = chunk.source_ref?.frame_id;
      if (!filename || !frameId) return;
      if (!nonBasicByVideo.has(filename)) {
        nonBasicByVideo.set(filename, new Set());
      }
      nonBasicByVideo.get(filename).add(frameId);
    });

    const totalFrames = Array.from(nonBasicByVideo.values()).reduce(
      (sum, frames) => sum + frames.size,
      0
    );
    const perVideoProgress = new Map();
    let lastStatusUpdate = 0;

    const updateLoadingStatus = (done) => {
      if (isStaleSegment()) return;
      const statusEl = targetEl.querySelector('[data-role="loading-status"]');
      if (!statusEl) return;
      if (!totalFrames) {
        statusEl.textContent = 'loading screen entries...';
        return;
      }
      const decoded = Array.from(perVideoProgress.values()).reduce((sum, count) => sum + count, 0);
      const pct = Math.min(100, Math.round((decoded / totalFrames) * 100));
      statusEl.textContent = done
        ? 'Rendering screen entries...'
        : `Decoding key frames ${decoded}/${totalFrames} (${pct}%)...`;
    };

    const makeProgressHandler = (videoUrl) => (count) => {
      if (isStaleSegment()) return;
      const now = Date.now();
      perVideoProgress.set(videoUrl, count);
      if (now - lastStatusUpdate > 150) {
        lastStatusUpdate = now;
        updateLoadingStatus(false);
      }
    };

    updateLoadingStatus(false);

    const decodeJobs = [];
    Object.entries(currentVideoFiles).forEach(([filename, url]) => {
      const frameIds = Array.from(nonBasicByVideo.get(filename) || []);
      if (frameIds.length > 0) {
        decodeJobs.push(
          frameCapture.prefetchThumbnails(
            url,
            frameIds,
            makeProgressHandler(url),
            signal
          )
        );
      }
    });

    if (decodeJobs.length === 0) {
      screenDecoded = true;
      return Promise.resolve();
    }

    return Promise.all(decodeJobs)
      .then(() => {
        if (isStaleSegment()) return;
        screenDecoded = true;
        updateLoadingStatus(true);
      })
      .catch(() => {
        if (isStaleSegment()) return;
        screenDecoded = true;
        updateLoadingStatus(true);
      });
  }

  function buildTabBar(data) {
    tabsContainer.innerHTML = '';
    tabsContainer.setAttribute('role', 'tablist');
    tabsContainer.classList.remove('visible');
    panel.innerHTML = '';
    tabPanes = {};
    activeTab = null;
    screenDecoded = false;

    const addTab = (tabId, label) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tr-tab';
      btn.dataset.tab = tabId;
      btn.textContent = label;
      btn.setAttribute('role', 'tab');
      btn.id = 'tr-tab-' + tabId;
      btn.setAttribute('aria-selected', 'false');
      btn.setAttribute('aria-controls', 'tr-tabpanel-' + tabId);
      btn.setAttribute('tabindex', '-1');
      btn.addEventListener('click', () => activateTab(tabId));
      tabsContainer.appendChild(btn);
    };

    const dataState = data.data_state || {};
    addTab('transcript', 'transcript');
    if (dataState.audio) {
      addTab('audio', 'audio');
    }
    if (dataState.screen) {
      addTab('screen', 'screen');
    }

    const mdStems = Object.keys(data.md_files || {}).sort((a, b) => a.localeCompare(b));
    mdStems.forEach(stem => addTab(`md-${stem}`, stem));

    tabsContainer.classList.add('visible');
  }

  function activateTab(tabId) {
    if (!segmentData || tabId === activeTab) {
      return;
    }

    tabsContainer.querySelectorAll('.tr-tab').forEach(tab => {
      const isActive = tab.dataset.tab === tabId;
      tab.classList.toggle('active', isActive);
      tab.setAttribute('aria-selected', String(isActive));
      tab.setAttribute('tabindex', isActive ? '0' : '-1');
    });

    Object.values(tabPanes).forEach(pane => pane.classList.remove('active'));

    let pane = tabPanes[tabId];
    if (!pane) {
      pane = document.createElement('div');
      pane.className = 'tr-tab-pane';
      pane.dataset.tab = tabId;
      pane.setAttribute('role', 'tabpanel');
      pane.setAttribute('tabindex', '0');
      pane.id = 'tr-tabpanel-' + tabId;
      pane.setAttribute('aria-labelledby', 'tr-tab-' + tabId);
      panel.appendChild(pane);
      tabPanes[tabId] = pane;

      if (tabId === 'transcript') {
        renderSegmentTimeline(segmentData, true, true, pane);
      } else if (tabId === 'audio') {
        renderSegmentTimeline(segmentData, true, false, pane);
      } else if (tabId === 'screen') {
        const segmentToken = selectedSegment?.key;
        pane.innerHTML = window.SurfaceState.loading({ text: 'Loading screen entries...' });
        prepareScreenFrames(
          segmentData,
          pane,
          segmentToken,
          currentSegmentAbort?.signal
        )
          .then(() => {
            if (!selectedSegment || selectedSegment.key !== segmentToken) {
              return;
            }
            if (tabPanes[tabId] !== pane) {
              return;
            }
            renderSegmentTimeline(segmentData, false, true, pane);
          })
          .catch(() => {
            if (!selectedSegment || selectedSegment.key !== segmentToken) {
              return;
            }
            if (tabPanes[tabId] !== pane) {
              return;
            }
            pane.innerHTML = window.SurfaceState.error({
              heading: 'couldn\'t load screen entries',
              desc: 'something went wrong decoding the screen data. try selecting the segment again.'
            });
          });
      } else if (tabId.startsWith('md-')) {
        const stem = tabId.slice(3);
        const content = (segmentData.md_files || {})[stem] || '';
        pane.innerHTML = `<div class="tr-md-content">${window.AppServices.renderMarkdown(content)}</div>`;
      }
    }

    pane.classList.add('active');
    activeTab = tabId;
    if (selectedSegment) {
      history.replaceState(null, '', `#${selectedSegment.key}/${tabId}`);
    }
  }

	  function formatAudioDuration(seconds) {
    const totalSeconds = Math.round(Number(seconds) || 0);
    if (totalSeconds <= 0) return '';

    const secs = totalSeconds % 60;
    const minutes = Math.floor(totalSeconds / 60) % 60;
    const hours = Math.floor(totalSeconds / 3600);
    if (hours > 0) {
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
	    return `${minutes}:${String(secs).padStart(2, '0')}`;
	  }

  function renderAnalyzeButton(modality, label) {
    const title = BTN_TITLE(modality);
    return `<button type="button" class="tr-analyze-action" data-modality="${escapeHtml(modality)}" aria-label="${escapeHtml(title)}" title="${escapeHtml(title)}">${escapeHtml(label)}</button>`;
  }

  function renderFailedDataState(modality) {
    return `<div class="surface-state surface-state--error" role="alert">`
      + `<div class="surface-state-icon" aria-hidden="true">${emptyIcons[modality] || emptyIcons.transcript}</div>`
      + `<h2 class="surface-state-heading">${escapeHtml(dataStateCopy(modality, 'failed'))}</h2>`
      + `<p class="surface-state-desc">analysis errored for this segment</p>`
      + `<div class="surface-state-action">${renderAnalyzeButton(modality, BTN_LABEL_FAILED)}</div>`
      + `</div>`;
  }

  function renderDataStateAffordance(modality, state, data) {
    const icon = emptyIcons[modality] || emptyIcons.transcript;
    if (state === 'pending') {
      const metadata = [];
      if (modality === 'audio') {
        const duration = formatAudioDuration(data.duration);
        if (duration) metadata.push('duration ' + duration);
      }
      const size = formatSize(data.media_sizes?.[modality]);
      if (size) metadata.push('raw media ' + size);
      return window.SurfaceState.empty({
        icon,
        heading: dataStateCopy(modality, 'pending'),
        desc: metadata.join(' · '),
        action: renderAnalyzeButton(modality, BTN_LABEL_PENDING)
      });
    }
    if (state === 'analyzing') {
      return `<div class="surface-state surface-state--loading tr-analyzing-state" role="status" aria-busy="true">`
        + `<div class="surface-state-spinner" aria-hidden="true"></div>`
        + `<span class="surface-state-text">${escapeHtml(ANALYZING_LABEL)}</span>`
        + `</div>`;
    }
    if (state === 'failed') {
      return renderFailedDataState(modality);
    }
    if (state === 'purged') {
      return window.SurfaceState.empty({
        icon,
        heading: 'Raw observed media removed per retention policy',
        desc: ''
      });
    }
    return '';
  }

  function tabExists(tabId) {
    return [...tabsContainer.querySelectorAll('.tr-tab')].some(tab => tab.dataset.tab === tabId);
  }

  function renderLoadedSegmentData(data, requestedTabId = null) {
    segmentData = data;
    updateRangeText();
    buildTabBar(data);
    const nextTab = requestedTabId && tabExists(requestedTabId) ? requestedTabId : 'transcript';
    activateTab(nextTab);
    renderWarningNotice(data);
  }

  function currentAnalyzingModalities(dataState) {
    return ['audio', 'screen'].filter(modality => dataState[modality] === 'analyzing');
  }

  function stopAnalyzePoller() {
    if (analyzePollTimer) {
      clearInterval(analyzePollTimer);
    }
    analyzePollTimer = null;
    analyzePollStartedAt = 0;
    analyzePollModalities.clear();
  }

  function updateSelectedSegmentDataState(dataState) {
    if (!selectedSegment) return;
    selectedSegment.data_state = { ...(selectedSegment.data_state || {}), ...dataState };
    const matchingSegment = allSegments.find(
      seg => seg.key === selectedSegment.key && seg.stream === selectedSegment.stream
    );
    if (matchingSegment) {
      matchingSegment.data_state = { ...(matchingSegment.data_state || {}), ...dataState };
    }
  }

  function applySegmentDataState(dataState) {
    if (!dataState) return;
    updateSelectedSegmentDataState(dataState);
    buildZoomSegments();
    refreshSegmentIndicators();
  }

  function rerenderSegmentAfterAnalysis(data, preferredTab = activeTab) {
    currentVideoFiles = {};
    tabPanes = {};
    activeTab = null;
    screenDecoded = false;
    frameCapture.clear();
    renderLoadedSegmentData(data, preferredTab);
  }

  function showAnalyzeError(button, message) {
    const action = button.closest('.surface-state-action') || button.parentElement;
    if (!action) return;
    action.parentElement?.querySelectorAll('.tr-analyze-error').forEach(el => el.remove());
    const errorEl = document.createElement('p');
    errorEl.className = 'tr-analyze-error';
    errorEl.setAttribute('role', 'alert');
    errorEl.textContent = message || 'analysis request failed';
    action.insertAdjacentElement('afterend', errorEl);
  }

  function renderAnalyzeStateInPlace(button, modality, state) {
    const surface = button.closest('.surface-state');
    if (!surface || !segmentData) return;
    const replacement = renderDataStateAffordance(modality, state, segmentData);
    if (replacement) {
      surface.outerHTML = replacement;
    }
  }

  async function performAnalyzeNow(button, modality) {
    if (!selectedSegment || !modality) return;
    const seg = selectedSegment;
    button.disabled = true;
    button.setAttribute('aria-busy', 'true');
    button.closest('.surface-state')?.querySelectorAll('.tr-analyze-error').forEach(el => el.remove());

    try {
      const response = await fetch(
        `/app/transcripts/api/segment/${day}/${seg.stream}/${seg.key}/reprocess`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ modality })
        }
      );
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || 'analysis request failed');
      }

      segmentData = { ...(segmentData || {}), data_state: data.data_state || {} };
      applySegmentDataState(segmentData.data_state);
      renderAnalyzeStateInPlace(button, modality, 'analyzing');
      startAnalyzePoller([modality]);
    } catch (err) {
      button.disabled = false;
      button.removeAttribute('aria-busy');
      showAnalyzeError(button, err.message);
    }
  }

  async function pollAnalyzeState() {
    if (!selectedSegment || analyzePollModalities.size === 0) {
      stopAnalyzePoller();
      return;
    }
    if (Date.now() - analyzePollStartedAt > ANALYZE_POLL_MAX_MS) {
      stopAnalyzePoller();
      return;
    }

    const seg = selectedSegment;
    try {
      const response = await fetch(`/app/transcripts/api/segment/${day}/${seg.stream}/${seg.key}`);
      if (!response.ok) return;
      const data = await response.json();
      if (!selectedSegment || selectedSegment.key !== seg.key || selectedSegment.stream !== seg.stream) {
        return;
      }
      const dataState = data.data_state || {};
      segmentData = data;
      applySegmentDataState(dataState);

      const watched = [...analyzePollModalities];
      const complete = watched.every(modality => (
        dataState[modality] === 'analyzed' || dataState[modality] === 'failed'
      ));
      if (complete) {
        const preferredTab = activeTab;
        stopAnalyzePoller();
        rerenderSegmentAfterAnalysis(data, preferredTab);
      }
    } catch (err) {
      console.debug('transcripts: analysis poll failed', err);
    }
  }

  function startAnalyzePoller(modalities) {
    modalities.forEach(modality => analyzePollModalities.add(modality));
    if (analyzePollTimer) return;
    analyzePollStartedAt = Date.now();
    analyzePollTimer = setInterval(pollAnalyzeState, ANALYZE_POLL_INTERVAL_MS);
  }

  function renderSegmentTimeline(data, showAudio, showScreen, targetEl) {
    const chunks = (data.chunks || []).filter(c => {
      if (c.type === 'audio' && !showAudio) return false;
      if (c.type === 'screen' && !showScreen) return false;
      return true;
    });
    const dataState = data.data_state || {};

    const textOnlyScreen = showScreen && Object.keys(currentVideoFiles).length === 0;

    // Build flat list of all screen frames for modal navigation
    allScreenFrames = chunks.filter(c => c.type === 'screen');
    currentFrameIndex = -1;

    if (chunks.length === 0) {
      if (showAudio && !showScreen && dataState.audio && dataState.audio !== 'analyzed') {
        targetEl.innerHTML = renderDataStateAffordance('audio', dataState.audio, data);
        return;
      }
      if (!showAudio && showScreen && dataState.screen && dataState.screen !== 'analyzed') {
        targetEl.innerHTML = renderDataStateAffordance('screen', dataState.screen, data);
        return;
      }
      if (showAudio && showScreen) {
        const states = ['audio', 'screen']
          .filter(modality => dataState[modality] && dataState[modality] !== 'analyzed')
          .map(modality => renderDataStateAffordance(modality, dataState[modality], data))
          .filter(Boolean);
        if (states.length > 0) {
          targetEl.innerHTML = `<div class="tr-state-stack">${states.join('')}</div>`;
          return;
        }
      }
      const tabType = !showScreen ? 'audio' : !showAudio ? 'screen' : 'transcript';
      const tabEmptyMap = {
        transcript: { icon: emptyIcons.transcript, heading: 'no transcript entries', desc: 'this segment has no transcript content' },
        audio: { icon: emptyIcons.audio, heading: 'no audio entries', desc: 'this segment has no audio content' },
        screen: { icon: emptyIcons.screen, heading: 'no screen entries', desc: 'this segment has no screen observations' }
      };
      const emptyInfo = tabEmptyMap[tabType] || tabEmptyMap.transcript;
      targetEl.innerHTML = window.SurfaceState.empty(emptyInfo);
      return;
    }

    // Group sequential basic screen frames together
    const displayItems = textOnlyScreen ? chunks : groupBasicScreenFrames(chunks);
    groupEntriesByIdx = new Map();

    let html = `<div class="tr-unified" role="list" aria-label="transcript entries, ${displayItems.length} items">`;

    // Audio player section (if we have audio)
    if (data.audio_file && showAudio) {
      const audioExt = (data.audio_file.split('.').pop() || '').toLowerCase();
      const audioMime = ({flac:'audio/flac', m4a:'audio/mp4', mp4:'audio/mp4', mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg'})[audioExt] || '';
      const audioDuration = formatAudioDuration(data.duration);
      const audioLabel = audioDuration ? `segment audio · ${audioDuration}` : 'segment audio';
      html += '<div class="tr-audio-players" role="presentation">';
      html += '<div class="tr-audio-player">';
      html += `<div class="tr-audio-player-label">${audioLabel}</div>`;
      html += `<audio data-role="segment-audio" controls preload="metadata"><source src="${escapeHtml(data.audio_file)}" type="${audioMime}">Your browser does not support audio.</audio>`;
      html += '</div></div>';
    }

    const audioPurged = data.media_purged?.audio && !data.audio_file && showAudio;
    const screenPurged = data.media_purged?.screen && showScreen && chunks.some(c => c.type === 'screen');
    if (audioPurged || screenPurged) {
      html += '<div class="tr-purge-notice" role="presentation">Raw observed media removed per retention policy</div>';
    }

    // Render items (chunks or groups)
    displayItems.forEach((item, idx) => {
      if (item.type === 'screen-group') {
        groupEntriesByIdx.set(idx, item.entries || []);
        // Render collapsed group of basic frames
        html += renderScreenGroup(item, idx);
      } else if (item.type === 'audio') {
        const timeStr = item.time || '';
        html += `<div class="tr-entry tr-entry-audio" data-idx="${idx}" data-type="audio" data-timestamp="${item.timestamp}" role="listitem" tabindex="0" aria-label="play from ${timeStr}">`;
        html += `<div class="tr-entry-time">${timeStr}</div>`;
        html += '<div class="tr-entry-content">';
        html += '<span class="sr-only">Audio: </span>';
        if (item.speaker_label) {
          const sl = item.speaker_label;
          const dotClass = sl.confidence === 'high' ? 'tr-speaker-dot-high' : 'tr-speaker-dot-medium';
          const labelClass = sl.is_owner ? 'tr-speaker-label tr-speaker-label-owner' : 'tr-speaker-label';
          const displayName = sl.is_owner ? 'You' : escapeHtml(sl.name);
          const entityHref = '/app/entities#' + encodeURIComponent(sl.entity_id);
          html += `<div class="${labelClass}" aria-label="speaker: ${displayName}, ${sl.confidence} confidence"><span class="tr-speaker-dot ${dotClass}"></span><a href="${entityHref}">${displayName}</a><span class="sr-only">${sl.confidence} confidence</span></div>`;
        }
        html += `<div class="tr-entry-text">${escapeHtml(item.markdown)}</div>`;
        html += '</div></div>';
      } else if (item.type === 'screen') {
        if (textOnlyScreen) {
          const timeStr = item.time || '';
          const markdown = window.AppServices.renderMarkdown(item.markdown) || 'Screen activity';
          html += '<div class="tr-entry" role="listitem">';
          html += `<div class="tr-entry-time">${timeStr}</div>`;
          html += '<div class="tr-entry-content">';
          html += '<span class="sr-only">Screen: </span>';
          html += `<div class="tr-screen-text">${markdown}</div>`;
          html += '</div></div>';
        } else {
          // Enhanced screen frame - render fully
          html += renderEnhancedScreenEntry(item, idx);
        }
      }
    });

    html += '</div>';
    targetEl.innerHTML = html;

    // Get audio element reference
    const paneAudioEl = targetEl.querySelector('audio[data-role="segment-audio"]');
    if (paneAudioEl) {
      paneAudioEl.addEventListener('loadedmetadata', () => {
        if (Number.isFinite(paneAudioEl.duration) && paneAudioEl.duration > 0) {
          return;
        }

        const handleDurationChange = () => {
          if (!Number.isFinite(paneAudioEl.duration) || paneAudioEl.duration === 0) {
            return;
          }
          paneAudioEl.currentTime = 0;
          paneAudioEl.removeEventListener('durationchange', handleDurationChange);
        };

        paneAudioEl.addEventListener('durationchange', handleDurationChange);
        paneAudioEl.currentTime = 1e7;
      }, { once: true });
    }

    // Add click handlers for audio entries to seek
    targetEl.querySelectorAll('.tr-entry-audio').forEach(entry => {
      entry.addEventListener('click', () => {
        if (paneAudioEl && segmentData?.audio_file) {
          const timestamp = parseInt(entry.dataset.timestamp, 10);
          const baseTimestamp = chunks[0]?.timestamp || timestamp;
          const offsetSec = (timestamp - baseTimestamp) / 1000;
          paneAudioEl.currentTime = Math.max(0, offsetSec);
          paneAudioEl.play();
        }
      });
    });

    // Add keyboard handler for audio entries
    targetEl.querySelectorAll('.tr-entry-audio').forEach(entry => {
      entry.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          entry.click();
        }
      });
    });

    // Playback highlight: track current entry during audio playback
    if (paneAudioEl) {
      const baseTimestamp = chunks[0]?.timestamp || 0;
      let activeEntry = null;

      paneAudioEl.addEventListener('timeupdate', () => {
        const currentMs = baseTimestamp + (paneAudioEl.currentTime * 1000);
        const entries = targetEl.querySelectorAll('.tr-entry-audio[data-timestamp]');
        let best = null;
        for (const el of entries) {
          const ts = parseInt(el.dataset.timestamp, 10);
          if (ts <= currentMs) best = el;
          else break;
        }
        if (best === activeEntry) return;
        if (activeEntry) activeEntry.classList.remove('tr-entry-active');
        activeEntry = best;
        if (activeEntry) {
          activeEntry.classList.add('tr-entry-active');
          activeEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });

      paneAudioEl.addEventListener('ended', () => {
        if (activeEntry) {
          activeEntry.classList.remove('tr-entry-active');
          activeEntry = null;
        }
      });
    }

    // Add click handlers for enhanced screen entries to open modal
    targetEl.querySelectorAll('.tr-entry-screen').forEach(entry => {
      const thumb = entry.querySelector('.tr-entry-thumb');
      if (thumb) {
        thumb.addEventListener('click', (e) => {
          e.stopPropagation();
          const frameIdx = parseInt(entry.dataset.frameIdx, 10);
          if (!isNaN(frameIdx)) openImageModal(frameIdx);
        });
      }
    });

    // Add click handlers for group headers to expand/collapse
    targetEl.querySelectorAll('.tr-group-header').forEach(header => {
      header.addEventListener('click', () => {
        const groupEl = header.parentElement;
        const isExpanded = groupEl.classList.toggle('expanded');
        header.setAttribute('aria-expanded', String(isExpanded));
        if (!isExpanded) return;
        if (groupEl.dataset.prefetched === 'true') return;
        const groupIdx = parseInt(groupEl.dataset.idx, 10);
        if (isNaN(groupIdx)) return;
        const entries = groupEntriesByIdx.get(groupIdx) || [];
        prefetchGroupThumbnails(
          entries,
          groupEl,
          targetEl,
          currentSegmentAbort?.signal
        );
      });
      header.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          header.click();
        }
      });
    });

    // Add click handlers for group grid items to open modal
    targetEl.querySelectorAll('.tr-group-item').forEach(item => {
      item.addEventListener('click', () => {
        const frameIdx = parseInt(item.dataset.frameIdx, 10);
        if (!isNaN(frameIdx)) openImageModal(frameIdx);
      });
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          item.click();
        }
      });
    });

    // Set up lazy loading for canvas thumbnails using IntersectionObserver
    if (!textOnlyScreen) {
      setupLazyCanvasLoading(targetEl);
    }
  }

  function prefetchGroupThumbnails(entries, groupEl, targetEl, signal) {
    const frameIdsByVideo = new Map();
    for (const entry of entries) {
      const filename = entry.source_ref?.filename;
      const frameId = entry.source_ref?.frame_id;
      if (!filename || !frameId) continue;
      if (!frameIdsByVideo.has(filename)) {
        frameIdsByVideo.set(filename, new Set());
      }
      frameIdsByVideo.get(filename).add(frameId);
    }

    const jobs = [];
    for (const [filename, frameIds] of frameIdsByVideo.entries()) {
      const url = currentVideoFiles[filename];
      if (!url) continue;
      jobs.push(
        frameCapture.prefetchThumbnails(url, Array.from(frameIds), null, signal)
      );
    }

    if (jobs.length > 0) {
      groupEl.dataset.prefetched = 'true';
      Promise.all(jobs).finally(() => {
        setupLazyCanvasLoading(targetEl);
      });
    }
  }

  // Lazy load canvas thumbnails when they become visible
  function setupLazyCanvasLoading(targetEl = panel) {
    const canvases = targetEl.querySelectorAll('canvas[data-video-url]');
    if (canvases.length === 0) return;

    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          const canvas = entry.target;
          observer.unobserve(canvas);
          loadCanvasThumbnail(canvas);
        }
      }
    }, { rootMargin: '100px' });

    canvases.forEach(canvas => observer.observe(canvas));
  }

  // Load a single canvas thumbnail
  function loadCanvasThumbnail(canvas) {
    const videoUrl = canvas.dataset.videoUrl;
    const frameId = parseInt(canvas.dataset.frameId, 10);

    if (!videoUrl || isNaN(frameId)) {
      canvas.classList.remove('loading');
      return;
    }

    // Draw at thumbnail size (120x68) - no overlays on thumbnails
    frameCapture.drawThumbnail(canvas, videoUrl, frameId, {
      width: 120,
      height: 68
    });
  }

  function groupBasicScreenFrames(chunks) {
    // Group sequential basic screen frames, keep audio and enhanced screens separate
    const result = [];
    let currentGroup = null;
