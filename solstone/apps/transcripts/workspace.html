    for (const chunk of chunks) {
      const isBasicScreen = chunk.type === 'screen' && chunk.basic === true;

      if (isBasicScreen) {
        // Add to current group or start new one
        if (!currentGroup) {
          currentGroup = {
            type: 'screen-group',
            entries: [],
            startTime: chunk.time,
            endTime: chunk.time
          };
        }
        currentGroup.entries.push(chunk);
        currentGroup.endTime = chunk.time;
      } else {
        // Flush any pending group
        if (currentGroup) {
          result.push(currentGroup);
          currentGroup = null;
        }
        result.push(chunk);
      }
    }

    // Flush final group
    if (currentGroup) {
      result.push(currentGroup);
    }

    return result;
  }

  function findFrameIndex(chunk) {
    // Find this chunk's index in allScreenFrames by matching source_ref
    const ref = chunk.source_ref;
    return allScreenFrames.findIndex(f =>
      f.source_ref?.filename === ref?.filename &&
      f.source_ref?.frame_id === ref?.frame_id
    );
  }

  // Get video URL for a chunk
  function getVideoUrlForChunk(chunk) {
    const filename = chunk.source_ref?.filename;
    return filename ? currentVideoFiles[filename] : null;
  }

  function renderScreenGroup(group, idx) {
    const count = group.entries.length;
    const timeRange = group.startTime === group.endTime
      ? group.startTime
      : `${group.startTime} - ${group.endTime}`;
    const countText = count === 1 ? '1 frame' : `${count} frames`;

    let html = `<div class="tr-group" data-idx="${idx}" role="listitem">`;
    html += `<div class="tr-group-header" role="button" tabindex="0" aria-expanded="false" aria-controls="tr-group-grid-${idx}">`;
    html += `<svg class="tr-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>`;
    html += `<span class="tr-group-time">${timeRange}</span>`;
    html += `<span class="tr-group-count">${countText}</span>`;
    html += '</div>';

    // Grid of thumbnails (hidden until expanded)
    html += `<div class="tr-group-grid" id="tr-group-grid-${idx}">`;
    for (const entry of group.entries) {
      const videoUrl = getVideoUrlForChunk(entry);
      const frameId = entry.source_ref?.frame_id;
      const analysis = entry.source_ref?.analysis || {};
      const category = analysis.primary || 'unknown';
      const description = analysis.visual_description || category;
      const frameIdx = findFrameIndex(entry);

      if (videoUrl && frameId) {
        html += `<div class="tr-group-item" data-frame-idx="${frameIdx}" title="${escapeHtml(description)}" role="button" tabindex="0">`;
        html += `<canvas class="loading" data-video-url="${escapeHtml(videoUrl)}" data-frame-id="${frameId}"></canvas>`;
        html += `<span class="tr-group-item-badge">${escapeHtml(category)}</span>`;
        html += '</div>';
      }
    }
    html += '</div>';

    html += '</div>';
    return html;
  }

  function renderEnhancedScreenEntry(chunk, idx) {
    const timeStr = chunk.time || '';
    const monitor = chunk.source_ref?.monitor || '';
    const videoUrl = getVideoUrlForChunk(chunk);
    const frameId = chunk.source_ref?.frame_id;
    const frameIdx = findFrameIndex(chunk);

    let html = `<div class="tr-entry tr-entry-screen" data-idx="${idx}" data-frame-idx="${frameIdx}" data-type="screen" role="listitem">`;
    html += `<div class="tr-entry-time">${timeStr}</div>`;
    html += '<div class="tr-entry-content">';
    html += '<span class="sr-only">Screen: </span>';

    if (videoUrl && frameId) {
      html += `<canvas class="tr-entry-thumb loading" data-video-url="${escapeHtml(videoUrl)}" data-frame-id="${frameId}"></canvas>`;
    }

    html += '<div class="tr-entry-desc">';
    if (monitor) {
      const monitorPos = getMonitorPosition(monitor);
      if (monitorPos) html += `<span class="tr-entry-badge tr-entry-badge-monitor">${monitorPos}</span>`;
    }
    if (chunk.markdown) {
      html += window.AppServices.renderMarkdown(chunk.markdown);
    }
    html += '</div>';

    html += '</div></div>';
    return html;
  }

  function openImageModal(frameIndex) {
    if (frameIndex < 0 || frameIndex >= allScreenFrames.length) return;

    currentFrameIndex = frameIndex;
    let maskHidden = false; // Track if user has revealed masked content
    const triggerElement = document.activeElement;
    const prevOverflow = document.body.style.overflow;

    const modal = document.createElement('div');
    modal.className = 'tr-screenshot-modal';
    modal.id = 'trImageModal';
    modal.setAttribute('role', 'dialog');
    modal.setAttribute('aria-modal', 'true');
    modal.setAttribute('aria-label', 'Screenshot viewer');

    const drawFrame = (canvas, f, showMask) => {
      const videoUrl = getVideoUrlForChunk(f);
      const frameId = f.source_ref?.frame_id;
      const boxCoords = f.source_ref?.box_2d;
      const aruco = f.source_ref?.aruco;
      const participants = f.source_ref?.participants || [];

      if (videoUrl && frameId) {
        frameCapture.drawFull(canvas, videoUrl, frameId, {
          boxCoords,
          participants,
          aruco: showMask ? aruco : null // Pass null to skip mask
        });
      } else {
        canvas.classList.remove('loading');
      }
    };

    const updateModalContent = () => {
      const f = allScreenFrames[currentFrameIndex];
      const monitor = f.source_ref?.monitor || '';
      const monitorPos = getMonitorPosition(monitor);
      const analysis = f.source_ref?.analysis || {};
      const category = analysis.primary || '';
      const description = analysis.visual_description || '';
      const aruco = f.source_ref?.aruco;
      const isMasked = aruco?.masked && !maskHidden;
      const hasPrev = currentFrameIndex > 0;
      const hasNext = currentFrameIndex < allScreenFrames.length - 1;

      modal.innerHTML = `
        <div class="tr-modal-nav${hasPrev ? '' : ' disabled'}" data-dir="prev" title="previous frame (left arrow)" role="button" tabindex="${hasPrev ? '0' : '-1'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="tr-modal-center">
          <div class="tr-modal-header">
            ${monitorPos ? `<span class="tr-modal-badge tr-modal-badge-monitor">${monitorPos}</span>` : ''}
            ${category ? `<span class="tr-modal-badge tr-modal-badge-category">${escapeHtml(category)}</span>` : ''}
            ${isMasked ? '<span class="tr-modal-badge tr-modal-badge-masked" title="click image to reveal">masked</span>' : ''}
            <button class="tr-modal-close" title="close (esc)" aria-label="close">&times;</button>
          </div>
          <div class="tr-modal-img-wrap">
            <canvas id="trModalCanvas" class="loading${isMasked ? ' tr-masked-canvas' : ''}"></canvas>
          </div>
          ${description ? `<div class="tr-modal-description">${escapeHtml(description)}</div>` : ''}
        </div>
        <div class="tr-modal-nav${hasNext ? '' : ' disabled'}" data-dir="next" title="next frame (right arrow)" role="button" tabindex="${hasNext ? '0' : '-1'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      `;

      // Draw frame to modal canvas
      const canvas = modal.querySelector('#trModalCanvas');
      drawFrame(canvas, f, !maskHidden);

      // Add click-to-reveal handler for masked frames
      if (aruco?.masked) {
        canvas.addEventListener('click', () => {
          if (!maskHidden) {
            maskHidden = true;
            canvas.classList.remove('tr-masked-canvas');
            canvas.classList.add('loading');
            modal.querySelector('.tr-modal-badge-masked')?.remove();
            drawFrame(canvas, f, false);
          }
        });
      }
    };

    const navigateFrame = (delta) => {
      const newIndex = currentFrameIndex + delta;
      if (newIndex >= 0 && newIndex < allScreenFrames.length) {
        currentFrameIndex = newIndex;
        maskHidden = false; // Reset mask state when navigating
        updateModalContent();
        modal.querySelector('.tr-modal-close')?.focus();
      }
    };

    const closeModal = () => {
      modal.remove();
      document.removeEventListener('keydown', handleKeys);
      document.body.style.overflow = prevOverflow;
      if (triggerElement && document.contains(triggerElement)) triggerElement.focus();
      currentFrameIndex = -1;
    };

    const handleKeys = (e) => {
      if (e.key === 'Escape') closeModal();
      else if (e.key === 'ArrowLeft') { e.preventDefault(); navigateFrame(-1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); navigateFrame(1); }
      else if (e.key === 'Tab') {
        const focusable = [...modal.querySelectorAll('button:not([disabled]), [tabindex="0"]')];
        if (focusable.length === 0) return;
        const currentIndex = focusable.indexOf(document.activeElement);
        if (e.shiftKey) {
          e.preventDefault();
          focusable[currentIndex <= 0 ? focusable.length - 1 : currentIndex - 1].focus();
        } else {
          e.preventDefault();
          focusable[currentIndex >= focusable.length - 1 ? 0 : currentIndex + 1].focus();
        }
      }
    };

    // Event delegation for modal clicks
    modal.addEventListener('click', (e) => {
      const target = e.target.closest('.tr-modal-close, .tr-modal-nav:not(.disabled)');
      if (target) {
        if (target.classList.contains('tr-modal-close')) closeModal();
        else if (target.classList.contains('tr-modal-nav')) {
          navigateFrame(target.dataset.dir === 'prev' ? -1 : 1);
        }
      } else if (e.target === modal || e.target.classList.contains('tr-modal-img-wrap')) {
        closeModal();
      }
    });

    document.body.style.overflow = 'hidden';
    document.body.appendChild(modal);
    updateModalContent();
    modal.querySelector('.tr-modal-close')?.focus();
    document.addEventListener('keydown', handleKeys);
  }

  function updateZoom() {
    zoom.setAttribute('aria-label', 'Detail timeline (' + hhmm(range.start) + '\u2013' + hhmm(range.end) + ')');
    zoomHeight = zoom.clientHeight - 24; // account for padding
    const rangeLen = range.end - range.start;
    if (rangeLen > 0) {
      zoomPpm = zoomHeight / rangeLen;
      buildZoomGrid();
      buildZoomSegments();
    }
  }

  // Account for 12px padding top and bottom
  const PADDING = 24;

	  // Load combined transcript data
	  function loadDayData() {
	    fetch(`/app/transcripts/api/day/${day}`)
	    .then(async r => {
	      if (!r.ok) {
	        let payload = {};
	        try {
	          payload = await r.json();
	        } catch (_) {
	          payload = {};
	        }
	        throw new window.ApiError({
	          status: r.status,
	          statusText: r.statusText,
	          serverMessage: payload.error || `day data failed: ${r.status}`,
	          url: r.url,
	          reasonCode: payload.reason_code,
	          rawDetail: payload.detail,
	        });
	      }
	      return r.json();
	    })
    .then(data => {
      // Apply dynamic timeline bounds from ranges
      const bounds = computeTimelineBounds(data);
      timelineStart = bounds.start;
      timelineEnd = bounds.end;
      timeline.setAttribute('aria-label', 'Day timeline (' + hhmm(timelineStart) + '\u2013' + hhmm(timelineEnd) + ')');

      // Recalculate pixels-per-minute with new bounds
      height = timeline.clientHeight - PADDING;
      ppm = height / (timelineEnd - timelineStart);

      // Set initial selection range within bounds
      // Center on current time if viewing today, otherwise midpoint
      const now = new Date();
      const todayStr = String(now.getFullYear()) +
        String(now.getMonth() + 1).padStart(2, '0') +
        String(now.getDate()).padStart(2, '0');
      let center;
      if (day === todayStr) {
        const nowMin = now.getHours() * 60 + now.getMinutes();
        center = Math.max(timelineStart, Math.min(timelineEnd, nowMin));
      } else {
        center = (timelineStart + timelineEnd) / 2;
      }
      range = { start: snap(center - DEFAULT_LEN / 2), end: snap(center + DEFAULT_LEN / 2) };
      if (range.start < timelineStart) {
        range = { start: timelineStart, end: timelineStart + DEFAULT_LEN };
      }
      if (range.end > timelineEnd) {
        range = { start: timelineEnd - DEFAULT_LEN, end: timelineEnd };
      }

      // Build the grid and render timeline
      buildGrid();
      renderTimeline();

      // Add segment indicators from ranges
      (data.audio || []).forEach(rg => {
        const s = parseTime(rg.start);
        const e = parseTime(rg.end);
        addSegmentIndicator('audio', s, e, 0, rg.streams, rg.state || 'analyzed', rg.think);
      });
      (data.screen || []).forEach(rg => {
        const s = parseTime(rg.start);
        const e = parseTime(rg.end);
        addSegmentIndicator('screen', s, e, 1, rg.streams, rg.state || 'analyzed', rg.think);
      });

      // Now-marker for today
      if (day === todayStr) {
        const marker = document.createElement('div');
        marker.className = 'tr-now-marker';
        marker.setAttribute('aria-label', 'Current time');
        const lbl = document.createElement('span');
        lbl.className = 'tr-now-label';
        lbl.textContent = 'now';
        marker.appendChild(lbl);
        timeline.appendChild(marker);

        updateNowPosition = function() {
          const n = new Date();
          const nowMin = n.getHours() * 60 + n.getMinutes();
          if (nowMin < timelineStart || nowMin > timelineEnd) {
            marker.style.display = 'none';
          } else {
            marker.style.display = '';
            marker.style.top = y(nowMin) + 'px';
          }
        };
        updateNowPosition();
        setInterval(updateNowPosition, 60000);
      }

      // Store segments and update zoom
      allSegments = data.segments || [];
      updateZoom();
      if (allSegments.length === 0) {
        panel.innerHTML = window.SurfaceState.empty({
          icon: emptyIcons.nothing,
          heading: 'nothing here',
          desc: 'no observations were found for this day'
        });
      }

      // Check for hash fragment to auto-select segment
      const rawHash = window.location.hash.slice(1);
      const [segKey, tabIdFromHash] = rawHash.split('/', 2);
      if (segKey) {
        const seg = allSegments.find(s => s.key === segKey);
        if (seg) {
          const segStart = parseTime(seg.start);
          const segEnd = parseTime(seg.end);
          const rangeLen = range.end - range.start;
          const segMid = (segStart + segEnd) / 2;
          let newStart = snap(Math.max(timelineStart, segMid - rangeLen / 2));
          newStart = Math.min(newStart, timelineEnd - rangeLen);
          range = { start: newStart, end: newStart + rangeLen };
          renderTimeline();
          updateZoom();
          selectSegment(seg, false, tabIdFromHash);
        }
      }
    })
	    .catch(err => {
	      console.error('transcripts: day data load did not complete:', err);
	      zoomSegments.innerHTML = '';
	      panel.innerHTML = window.SurfaceState.error({
	        heading: "I couldn't load transcripts",
	        desc: window.CONVEY_COPY?.RELOAD_HINT || 'reload to try again.',
	        retry: true,
	        retryLabel: window.CONVEY_COPY?.ACTION_TRY_AGAIN || 'Try again',
	        serverMessage: err.serverMessage,
	        detail: err,
	      });
	      const retry = panel.querySelector('.surface-state-retry');
	      if (retry) retry.addEventListener('click', loadDayData);
	    });
	  }

  function initTranscripts() {
    // Resize observers
    new ResizeObserver(() => {
      height = timeline.clientHeight - PADDING;
      ppm = height / (timelineEnd - timelineStart);
      buildGrid();
      renderTimeline();
      if (updateNowPosition) updateNowPosition();
    }).observe(timeline);

    new ResizeObserver(() => {
      updateZoom();
    }).observe(zoom);

    loadDayData();

    // Handle browser back/forward
    window.addEventListener('hashchange', () => {
      const rawHash = window.location.hash.slice(1);
      const [segKey, tabIdFromHash] = rawHash.split('/', 2);
      if (!segKey) {
        return;
      }

      const seg = allSegments.find(s => s.key === segKey);
      if (!seg) {
        return;
      }

      if (!selectedSegment || selectedSegment.key !== segKey) {
        selectSegment(seg, false, tabIdFromHash);
        return;
      }

      if (
        tabIdFromHash
        && [...tabsContainer.querySelectorAll('.tr-tab')].some(
          tab => tab.dataset.tab === tabIdFromHash
        )
      ) {
        activateTab(tabIdFromHash);
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTranscripts);
  } else {
    initTranscripts();
  }

  // Keyboard navigation for segment stepping
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && deleteSegmentModal.style.display !== 'none') {
      e.preventDefault();
      closeDeleteSegmentModal();
      return;
    }
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;
    if (document.getElementById('trImageModal')) return;
    if (deleteSegmentModal.style.display !== 'none') return;
    if (e.key === ']') { e.preventDefault(); navigateSegment(1); }
    else if (e.key === '[') { e.preventDefault(); navigateSegment(-1); }
  });

  window.addEventListener('click', (event) => {
    if (event.target === deleteSegmentModal) {
      closeDeleteSegmentModal();
    }
  });

  window.addEventListener('beforeunload', stopAnalyzePoller);

  panel.addEventListener('click', (event) => {
    const button = event.target.closest('.tr-analyze-action');
    if (!button || !panel.contains(button)) return;
    event.preventDefault();
    performAnalyzeNow(button, button.dataset.modality);
  });

  // Click on timeline to set range
  timeline.addEventListener('click', (e) => {
    if (e.target.closest('.tr-sel')) return;
    const box = timeline.getBoundingClientRect();
    const py = e.clientY - box.top;
    let mid = snap(mFromY(py));
    let start = Math.max(timelineStart, Math.min(timelineEnd - DEFAULT_LEN, mid - DEFAULT_LEN / 2));
    start = snap(start);
    range = { start, end: snap(start + DEFAULT_LEN) };
    renderTimeline();
    updateZoom();
  });

  // Drag handlers for main selection
  function onPointerMove(ev) {
    if (!drag) return;
    ev.preventDefault();
    const dy = ev.clientY - drag.y0;
    const dMin = Math.round((dy / ppm) / STEP) * STEP;

    if (drag.mode === 'move') {
      const len = drag.r0.end - drag.r0.start;
      let s = drag.r0.start + dMin;
      s = Math.max(timelineStart, Math.min(timelineEnd - len, s));
      s = snap(s);
      range = { start: s, end: snap(s + len) };
    } else if (drag.mode === 'start') {
      let s = drag.r0.start + dMin;
      s = Math.max(timelineStart, Math.min(drag.r0.end - MIN_LEN, s));
      range = { start: snap(s), end: snap(drag.r0.end) };
    } else if (drag.mode === 'end') {
      let e = drag.r0.end + dMin;
      e = Math.min(timelineEnd, Math.max(drag.r0.start + MIN_LEN, e));
      range = { start: snap(drag.r0.start), end: snap(e) };
    }
    renderTimeline();
    updateZoom();
  }

  function onPointerUp() {
    drag = null;
    document.body.classList.remove('tr-dragging');
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
  }

  function beginDrag(mode) {
    return (ev) => {
      ev.stopPropagation();
      ev.preventDefault();
      document.body.classList.add('tr-dragging');
      drag = { mode, y0: ev.clientY, r0: { ...range } };
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
    };
  }

  sel.addEventListener('pointerdown', beginDrag('move'));
  sel.querySelector('[data-handle="start"]').addEventListener('pointerdown', beginDrag('start'));
  sel.querySelector('[data-handle="end"]').addEventListener('pointerdown', beginDrag('end'));

  function getMonitorPosition(monitor) {
    if (!monitor) return null;
    // Extract position from monitor string (e.g., "center_DP-3" -> "Center")
    const pos = monitor.split('_')[0];
    if (!pos) return null;
    // Capitalize first letter
    return pos.charAt(0).toUpperCase() + pos.slice(1);
  }

  function showDeleteSegmentModal() {
    if (!selectedSegment) return;

    const seg = selectedSegment;
    const totalBytes = (segmentData?.media_sizes?.audio || 0) + (segmentData?.media_sizes?.screen || 0);
    const sizeLine = totalBytes > 0
      ? `<p class="tr-delete-segment-size">Current raw media size: ${formatSize(totalBytes)}</p>`
      : '';

    deleteSegmentModalBody.innerHTML = `
      <p class="tr-delete-segment-meta"><strong>${escapeHtml(seg.stream)}</strong> · <strong>${escapeHtml(day)}</strong> · <strong>${escapeHtml(seg.start)} - ${escapeHtml(seg.end)}</strong></p>
      <p>You'll have about 10 seconds to undo this after confirming.</p>
      <p>This removes:</p>
      <ul class="tr-delete-segment-list">
        <li>audio</li>
        <li>screen recording</li>
        <li>transcripts</li>
        <li>derived insights</li>
      </ul>
      ${sizeLine}
    `;

    deleteModalReturnFocus = document.activeElement;
    deleteModalPrevOverflow = document.body.style.overflow;
    deleteSegmentModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    deleteSegmentModalConfirm.focus();
  }

  function closeDeleteSegmentModal(restoreFocus = true) {
    if (deleteSegmentModal.style.display === 'none') return;

    deleteSegmentModal.style.display = 'none';
    deleteSegmentModalBody.innerHTML = '';
    document.body.style.overflow = deleteModalPrevOverflow;
    deleteModalPrevOverflow = '';
    if (restoreFocus && deleteModalReturnFocus && document.contains(deleteModalReturnFocus)) {
      deleteModalReturnFocus.focus();
    }
    deleteModalReturnFocus = null;
  }

  async function confirmDeleteSegment() {
    if (!selectedSegment) return;

    const seg = selectedSegment;
    closeDeleteSegmentModal(false);
    await performDeleteSegment(seg);
  }

  function sortSegmentsByKey() {
    allSegments.sort((a, b) => a.key.localeCompare(b.key));
  }

  function refreshSegmentIndicators() {
    return fetch(`/app/transcripts/api/ranges/${day}`)
      .then(r => r.ok ? r.json() : Promise.reject('Failed to fetch ranges'))
      .then(data => {
        segmentsLane.innerHTML = '';
        (data.audio || []).forEach(rg => {
          const s = parseTime(rg.start);
          const e = parseTime(rg.end);
          addSegmentIndicator('audio', s, e, 0, rg.streams, rg.state || 'analyzed', rg.think);
        });
        (data.screen || []).forEach(rg => {
          const s = parseTime(rg.start);
          const e = parseTime(rg.end);
          addSegmentIndicator('screen', s, e, 1, rg.streams, rg.state || 'analyzed', rg.think);
        });
      })
      .catch(() => {
        // Range indicators may be stale, but the main segment state is already updated.
      });
  }

  async function performDeleteSegment(seg) {
    try {
      const response = await fetch(`/app/transcripts/api/segment/${day}/${seg.stream}/${seg.key}`, {
        method: 'DELETE'
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || 'Failed to delete segment');
      }

      const data = await response.json();

      // Remove segment from local state
      allSegments = allSegments.filter(s => s.key !== seg.key);

      // Clear selection and UI
      clearSegmentSelection();

      // Re-render zoom timeline
      buildZoomSegments();

      refreshSegmentIndicators();

      let pendingNotificationId = null;
      pendingNotificationId = window.AppServices.notifications.show({
        app: 'transcripts',
        icon: '🗑️',
        title: 'Deleting segment…',
        message: 'Cancels in 10s',
        dismissible: true,
        autoDismiss: 10000,
        buttons: [{
          label: 'Cancel',
          dismiss: false,
          onClick: () => cancelSegmentDelete(data.pending, seg, pendingNotificationId)
        }]
      });

      if (data.search_index_warning === true) {
        window.AppServices.notifications.show({
          app: 'transcripts',
          icon: '⚠️',
          title: 'Search index may be stale',
          message: 'Search results may be briefly stale until the supervisor is restarted and the index is rebuilt.',
          dismissible: true,
          autoDismiss: 10000
        });
      }

    } catch (err) {
      const notice = document.createElement('div');
      notice.className = 'tr-warning-notice visible';
      notice.style.borderColor = '#fca5a5';
      notice.style.background = '#fef2f2';
      notice.style.color = '#991b1b';
      notice.innerHTML = '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> <span>' + escapeHtml(err.message) + '</span>';
      panel.insertBefore(notice, panel.firstChild);
      setTimeout(() => {
        notice.style.opacity = '0';
        setTimeout(() => notice.remove(), 300);
      }, 5000);
    }
  }

  async function cancelSegmentDelete(pendingId, seg, notificationId) {
    try {
      const response = await fetch(`/app/transcripts/api/cancel-delete/${pendingId}`, {
        method: 'POST'
      });
      const data = await response.json().catch(() => ({}));

      if (notificationId !== null) {
        window.AppServices.notifications.dismiss(notificationId);
      }

      if (response.ok) {
        if (!allSegments.some(existing => existing.key === seg.key)) {
          allSegments.push(seg);
          sortSegmentsByKey();
        }
        buildZoomSegments();
        refreshSegmentIndicators();
        window.AppServices.notifications.show({
          app: 'transcripts',
          icon: '↩️',
          title: 'Delete cancelled',
          autoDismiss: 3000
        });
        return;
      }

      if (response.status === 410) {
        window.AppServices.notifications.show({
          app: 'transcripts',
          icon: '⏱️',
          title: 'Too late — already deleted',
          autoDismiss: 3000
        });
        return;
      }

      throw new Error(data.error || 'Failed to cancel delete');
    } catch (err) {
      window.AppServices.notifications.show({
        app: 'transcripts',
        icon: '⚠️',
        title: 'Couldn\'t cancel delete',
        message: err.message || 'Please try again.',
        autoDismiss: 3000
      });
    }
  }

  window.closeDeleteSegmentModal = closeDeleteSegmentModal;
  window.confirmDeleteSegment = confirmDeleteSegment;

  // Clear selection and reset UI state
  function clearSegmentSelection() {
    stopAnalyzePoller();
    selectedSegment = null;
    segmentData = null;
    currentVideoFiles = {};
    activeTab = null;
    tabPanes = {};
    screenDecoded = false;
    frameCapture.clear();
    allScreenFrames = [];
    currentFrameIndex = -1;
    groupEntriesByIdx.clear();

    // Stop and clear audio player reference
    panel.querySelectorAll('audio').forEach(audio => audio.pause());

    // Hide delete button
    deleteBtn.classList.remove('visible');

    // Clear URL hash
    history.replaceState(null, '', window.location.pathname);

    // Reset UI
    titleEl.textContent = 'transcripts';
    rangeText.textContent = '';
    tabsContainer.innerHTML = '';
    tabsContainer.classList.remove('visible');
	    warningNotice.classList.remove('visible');
    panel.innerHTML = window.SurfaceState.empty({
      icon: emptyIcons.day,
      heading: 'your day at a glance',
      desc: 'select a segment from the timeline to view its transcript'
    });

    // Clear active state in zoom view
    zoomSegments.querySelectorAll('.tr-zoom-pill').forEach(pill => {
      pill.classList.remove('tr-active');
    });
  }

  // Delete segment handler
  deleteBtn.addEventListener('click', () => {
    showDeleteSegmentModal();
  });

})();
</script>
