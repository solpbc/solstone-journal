<style>
/* Layout */
.dashboard {
  padding: 1.5rem 2rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  margin-top: 0;
  font-size: 1.75rem;
  margin-bottom: 0.5em;
  color: var(--facet-color, #b06a1a);
}

/* Loading state */
#loading {
  text-align: center;
  padding: 4em;
  color: #666;
}

.spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 4px solid #f0f0f0;
  border-top-color: var(--facet-color, #b06a1a);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 1em;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Alerts */
.alert {
  padding: 1em;
  border-radius: 8px;
  margin-bottom: 2em;
}

.alert-warning {
  background: #fff3cd;
  border: 1px solid #ffeaa7;
  color: #856404;
}

.alert-error {
  background: #f8d7da;
  border: 1px solid #f5c6cb;
  color: #721c24;
}

.stats-freshness {
  color: #888;
  font-size: 0.85em;
  font-weight: 500;
  margin: 0.25em 0 1.5em;
}

.stats-refresh {
  color: var(--facet-color, #b06a1a);
  text-decoration: none;
  margin-left: 0.5em;
  font-size: inherit;
  cursor: pointer;
}

.stats-refresh:hover {
  text-decoration: underline;
}

.stats-refresh:active {
  opacity: 0.7;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1.5em;
  margin-bottom: 1.5em;
}

.stat-card {
  background: white;
  border-radius: 12px;
  padding: 1.5em;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.06);
  transition: border-color 0.2s;
}

.stat-card:hover {
  border-color: var(--facet-border, #e5e0db);
}

.stat-card h3 {
  font-size: 0.9em;
  color: #666;
  margin: 0 0 0.75em 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.stat-value {
  font-size: 2em;
  font-weight: 700;
  margin: 0;
  color: var(--facet-color, #b06a1a);
  line-height: 1.1;
}

.stat-subtitle {
  font-size: 0.8em;
  color: #999;
  margin-top: 0.5em;
  font-weight: 400;
}

/* Progress cards */
.progress-section {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5em;
  margin-bottom: 1.5em;
}

.progress-card {
  background: white;
  border-radius: 12px;
  padding: 1.5em;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.06);
}

.progress-card h3 {
  margin-top: 0;
  color: #333;
}

.progress-bar {
  background: #f0f0f0;
  border-radius: 8px;
  height: 24px;
  overflow: hidden;
  margin: 1em 0 0.75em 0;
}

.progress-fill {
  height: 100%;
  background: var(--facet-color, #b06a1a);
  border-radius: 8px;
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  color: white;
  font-size: 0.75em;
  min-width: 3em;
  font-weight: 600;
}

.progress-stats {
  display: flex;
  justify-content: space-between;
  color: #666;
  font-size: 0.8em;
  padding: 0 0.25em;
}

/* Backlog */
.backlog-section {
  display: grid;
  gap: 1em;
  margin-bottom: 1.5em;
}

.backlog-hero {
  background: white;
  border-radius: 12px;
  padding: 1.25em 1.5em;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.06);
}

.backlog-hero-line {
  color: #2f2a24;
  font-size: 1.35em;
  font-weight: 700;
  line-height: 1.25;
  margin: 0;
}

.backlog-needs-hand {
  background: #fffaf0;
  border: 1px solid #f4d08a;
  border-left: 4px solid #d4a843;
  border-radius: 12px;
  padding: 1.25em 1.5em;
}

.backlog-needs-hand h2,
.backlog-list h2 {
  color: #333;
  font-size: 1.1em;
  margin: 0 0 0.5em;
}

.backlog-description {
  color: #5f564d;
  margin: 0 0 1em;
}

.backlog-rows {
  display: grid;
  gap: 0.75em;
}

.backlog-row {
  background: white;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 8px;
  padding: 0.9em 1em;
}

.backlog-row-link {
  align-items: center;
  color: inherit;
  display: grid;
  gap: 0.75em;
  grid-template-columns: minmax(7em, 1fr) auto;
  text-decoration: none;
}

.backlog-row-main {
  display: grid;
  gap: 0.25em;
}

.backlog-row-day {
  color: #2f2a24;
  font-weight: 700;
}

.backlog-row-copy {
  color: #675f58;
  font-size: 0.9em;
}

.backlog-badge {
  align-self: start;
  background: #fff3cd;
  border: 1px solid #e6c76b;
  border-radius: 999px;
  color: #6c4b00;
  font-size: 0.8em;
  font-weight: 700;
  padding: 0.25em 0.65em;
}

.backlog-depth {
  color: var(--facet-color, #b06a1a);
  font-weight: 700;
}

.backlog-list {
  background: white;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  padding: 1.25em 1.5em;
}

.backlog-routine-note {
  color: #675f58;
  margin: 0 0 1em;
}

.backlog-row details {
  grid-column: 1 / -1;
}

.backlog-row summary {
  cursor: pointer;
}

.backlog-why-list {
  color: #675f58;
  margin: 0.5em 0 0;
  padding-left: 1.25em;
}

/* Chart sections */
.chart-section {
  background: white;
  border-radius: 12px;
  padding: 1.5em;
  margin-bottom: 1.5em;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.06);
}

.chart-section h2 {
  margin-top: 0;
  color: #333;
  font-size: 1.5em;
  font-weight: 600;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chart {
  height: 300px;
  position: relative;
  margin-top: 1.5em;
  padding-bottom: 24px;
  padding-top: 8px;
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  height: 100%;
  gap: 3px;
  padding: 0 16px;
}

.bar {
  flex: 1;
  background: var(--facet-color, #b06a1a);
  border-radius: 4px 4px 0 0;
  transition: filter 0.2s;
  position: relative;
  min-width: 20px;
}

.bar:hover {
  filter: brightness(1.1);
}

.bar::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  white-space: pre;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 20;
}

.bar:hover::after {
  opacity: 1;
}

.bar-label {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75em;
  color: #666;
  white-space: nowrap;
}

.bar-value {
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.8em;
  font-weight: 500;
  color: #333;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
}

.bar:hover .bar-value {
  opacity: 1;
}

.empty-chart {
  text-align: center;
  color: #999;
  padding: 2em;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.5em;
  align-items: center;
  justify-content: center;
}

/* Heatmap */
.heatmap {
  display: grid;
  grid-template-columns: 40px repeat(24, 1fr);
  gap: 2px;
  margin-top: 1.5em;
}

.heatmap-label {
  font-size: 0.8em;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-weight: 600;
}

.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  background: #f0f0f0;
  transition: transform 0.2s;
  cursor: default;
  position: relative;
}

.heatmap-cell:hover {
  transform: scale(1.2);
  z-index: 10;
}

.heatmap-cell::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 20;
}

.heatmap-cell:hover::after {
  opacity: 1;
}

.heatmap-cell:focus-visible {
  outline: 2px solid var(--facet-color, #b06a1a);
  outline-offset: 1px;
  transform: scale(1.2);
  z-index: 10;
}

.heatmap-cell:focus-visible::after {
  opacity: 1;
}

.heatmap-header {
  grid-column: 2 / -1;
  display: grid;
  grid-template-columns: repeat(24, 1fr);
  gap: 2px;
  margin-bottom: 4px;
}

.heatmap-hour {
  text-align: center;
  font-size: 0.75em;
  color: #999;
  font-weight: 500;
}


/* Repair alert */
.alert-repair {
  background: white;
  border: 1px solid rgba(0,0,0,0.06);
  border-left: 3px solid #d4a843;
  padding: 1em 1.5em;
}

.alert-repair .stat-card {
  box-shadow: none;
  border-color: transparent;
}

.alert-repair .stat-value {
  color: #dc2626;
}

.alert-repair .stats-grid {
  margin-bottom: 0;
  grid-template-columns: repeat(2, 1fr);
}

/* Model selector */
.model-select {
  padding: 0.5em 1em;
  font-size: 0.9em;
  border: 1px solid var(--facet-border, #e5e0db);
  border-radius: 6px;
  background: white;
  color: #333;
  cursor: pointer;
  transition: all 0.2s;
}

.model-select:hover {
  border-color: var(--facet-color, #b06a1a);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.model-select:focus {
  outline: none;
  border-color: var(--facet-color, #b06a1a);
  box-shadow: 0 0 0 3px rgba(176, 106, 26, 0.1);
}

.model-select:focus-visible {
  outline: 2px solid var(--facet-color, #b06a1a);
  outline-offset: 2px;
}

.model-select:active {
  border-color: var(--facet-color, #b06a1a);
  box-shadow: 0 0 0 3px rgba(176, 106, 26, 0.2);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Stacked bar styles */
.bar-stack {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  height: 100%;
  border-radius: 4px 4px 0 0;
  overflow: hidden;
}

.stack-segment {
  min-height: 2px;
  transition: opacity 0.2s;
  position: relative;
}

.stack-segment.input {
  background: #2171b5;
}

.stack-segment.reasoning {
  background: #e6550d;
  background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.3) 3px, rgba(255,255,255,0.3) 6px);
}

.stack-segment.output {
  background: #31a354;
  background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
  background-size: 6px 6px;
}

.stack-segment.audio {
  background: #2171b5;
}

.stack-segment.screen {
  background: #e6550d;
  background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.3) 3px, rgba(255,255,255,0.3) 6px);
}

.token-legend {
  display: flex;
  gap: 1.5em;
  margin-top: 1em;
  font-size: 0.85em;
  justify-content: flex-start;
  font-weight: 500;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.5em;
}

.legend-color {
  width: 14px;
  height: 14px;
  border-radius: 2px;
}

/* Responsive */
@media (max-width: 768px) {
  .dashboard {
    padding: 1em;
  }
  .stats-grid {
    grid-template-columns: 1fr;
  }
  .alert-repair .stats-grid {
    grid-template-columns: 1fr;
  }
  .backlog-row {
    padding: 0.9em;
  }
  .backlog-row-link {
    grid-template-columns: 1fr;
  }
  .heatmap {
    font-size: 0.8em;
    grid-template-columns: 30px repeat(24, 1fr);
  }
  .bar {
    min-width: 10px;
  }
  .bar-value {
    top: -18px;
    font-size: 0.7em;
  }
  .bar-label {
    display: none;
  }
  .bar:first-child .bar-label,
  .bar:last-child .bar-label {
    display: block;
  }
}

@media (max-width: 480px) {
  .chart-header {
    flex-direction: column;
    align-items: flex-start;
  }
  .chart {
    height: 200px;
  }
  .chart-section {
    padding: 1em;
  }
  .bar {
    min-width: 6px;
  }
  .bar-value {
    display: none;
  }
  #heatmapSection {
    display: none;
  }
  .model-select {
    min-height: 44px;
  }
  .progress-section {
    grid-template-columns: 1fr;
  }
  .token-legend {
    flex-wrap: wrap;
    gap: 0.5em;
  }
}
</style>

<div class="dashboard" data-stats-url="{{ url_for('app:stats.stats_data') }}">
  <h1>journal dashboard</h1>

  <p id="statsFreshness" class="stats-freshness"></p>

  <div id="notice"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading dashboard data...</p>
  </div>

  <div id="mainContent" style="display: none;">
    <div id="statsGrid" class="stats-grid"></div>
    <div id="progressSection" class="progress-section"></div>

    <div class="chart-section">
      <div class="chart-header">
        <h2>token activity (last 30 days)</h2>

          <option value="">Select Model...</option>
        </select>

    </div>

    <div class="chart-section">
      <h2>facets (last 30 days)</h2>
      <div class="chart" id="facetsChart"></div>
    </div>

    <div class="chart-section">
      <h2>activities (last 30 days)</h2>
      <div class="chart" id="activitiesChart"></div>
    </div>
  </div>
</div>
